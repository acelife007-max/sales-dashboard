,"raw_text":"작성일자*\n2026-06-09\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 합천돼지자가 / 유정례 실장\n가)원료 시황 공유\n-DCP 시황 공유 / 염화콜린 시황 공유\n-월말  단가 변동사항 전달 하기로함\n나)농가대표 휴게실 뉴트리신 팜플렛 비치\n-농가 문의시 연결요청\n\n2) 합천축협 / 신성한 과장\n가) 원료 시황 공유\n- MDCP 보호지방 코코넛등\n나) 김민수 과장 금일 출장으로 인해 유선통화 연결\n- 추후 미팅 진행하기로함\n\n3) 에이스파마텍 / 김길조 대표\n가) 코코넛 분말 관련 논의\n- 시황 공유 및 ECM 단가 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["합천돼지자가","합천축협","에이스파마텍"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781046924604719","msg_ts":"1781046924.604719"},{"date":"2026-06-10","raw_text":"작성일자*\n2026-06-10\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)우정농장/ 김현우 대표\n가) 뉴트리신 제품홍보 논의\n- 나노비타믹스 접목 농가 선정요청\n- 수정율 타겟 농가 소개 요청\n- 지원사업 관련 내용 확인요청\n(수정란 지원사업등 )\n\n2)송정농장 / 박기철 대표\n가)뉴트리신 제품 관련 논의\n- 검정전문 농가 소개 요청\n- 나노비타믹스 효과 관련 농가테스트 계획 공유\n- 제품 홍보물 전달 및 나노비타믹스 제품 농가적용결과 전달\n\n3) 청도축협 / 이정훈 과장\n가)수태율 향상 관련 논의\n- 지역 전반적으로 수태율 낮은상황\n- 나노비타믹스 제품 소개 및 농가 홍보방안 논의\n- 개량부문 관련 총회 진행 - 2분기 미정 / 3분기 예상\n- 관련 일정 공유요청\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["우정농장","송정농장","청도축협"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781132159375229","msg_ts":"1781132159.375229"},{"date":"2026-06-11","raw_text":"작성일자*\n2026-06-11\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)부경양돈 / 김덕민 계장\n가) 라이신 입찰 관련 사항 논의\n- 예가 견적서 결과 확인\n- 황산염라이신 - 7개업체 희우 1000원 견적 / CSF 1200원 견적\n- 염산염라이신 - 희우 , CSF, ENT 1800원 견적\n 나) 입찰일정 공유\n- 15일(월) 입찰 일정 업로드\n- 23일(화) 입찰 진행 예정 \n\n2) 한성동물병원 / 이현정 원장\n가) 뉴트리신 판매 관련 논의\n- 각 제품별 판매 요청\n- 이지스타터 동일타겟 직접조제 제품 병행판매예정\n- 이지스타터 100kg 주문 및 발송요청함(신규)\n- 12일 (금) 입고 예정\n\n3)한우협회 영주시지부 / 실장\n가) 회사소개 및 제품 소개\n- 뉴트리신 제품 소개 및 팜플렛 전달\n나) 지원사업 일정 관련 문의\n- 약품의 경우 공동구매로 진행하나 첨가제의 경우 시도사업이용\n- 경북 소재 기업 제품으로 진행\n- 봉화지역의 경우 완화된 조항으로 소재지 구분 없을 가능성 있음\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부경양돈","한성동물병원","한우협회 영주시지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781221450251639","msg_ts":"1781221450.251639"},{"date":"2026-06-15","raw_text":"작성일자*\n2026-06-15\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)경영전략회의\n- 품목별 현재고 및 6~7월 적용단가 공유\n- 7월 단가인상 거래처 체크\n\n2)이병준 팀장 발표\n- 클로드 대시보드 활용 \n- 전직원 AI활용 공모 내용 공유\n\n3)사장님 주관 교육\n- 축산 컨설턴트 및 영업 포인트 교육\n- 나노비타민 제품 농가 적용 관련 교육\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":[],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781565804465549","msg_ts":"1781565804.465549"},{"date":"2026-06-16","raw_text":"작성일자*\n2026-06-16\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)노엘목장 / 신창호 대표\n가) 제품 소개 및 사용권유\n- 리버콜 골드 소개 및 단가전달\n나)농가 판매 관련 논의\n- 지역내 농가 모임 /회의 관련 문의\n- 분기별 진행하나 7, 8월 진행여부 확인해서 공유하기로함\n- 파인애플분말 농가 홍보 요청\n\n2)부경양돈 / 김덕민 계장\n가) 라이신 입찰 관련 사항 공유\n- 황산염라이신 / 염산염라이신 2개 원료 입찰진행\n- 추후 1개 선택 공급예정\n- 27년6월까지 1년 계약 진행예정\n\n3)지정낙우회 / 실장\n가)제품 홍보 및 지원사업일정 공유\n- 나노비타믹스 / 파인애플 분말 농가 홍보 요청\n나) 지원사업일정 공유\n- 조사료 , 악취저감제 위주로 진행 \n- 올해 지원사업비 상황에 따라 첨가제 구매도 가능\n- 추후 일정관련 사항 공유\n\n4) 한국수생명연구소 / 유진형 박사\n가) 곡물류 발효 및 1차 분쇄 가능 회사 소개 요청\n- 관련사항 익일 전달 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["노엘목장","부경양돈","지정낙우회","한국수생명연구소"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781651672703969","msg_ts":"1781651672.703969"},{"date":"2026-06-17","raw_text":"작성일자*\n2026-06-17\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1. 기본사항\n1)한우협회 거창군지부 / 실장\n가)뉴트리신 제품 홍보\n- 뉴트리신 제품 홍보 및 홍보물 비치\n- 농가 홍보요청\n나) 지원사업관련 문의\n- 작년 축협에서 내려주는 제품 위주로 진행\n- 올해 진행 내용은 지원사업 기간되야 확인 가능\n\n 2)지원동물병원 / 오지홍 원장\n거창축협 동물병원 퇴사 - 병원개업 (거창)\n가) 뉴트리신 제품 판매 및 지역홍보 관련 논의\n- 지역내 테스트 진행후 결과 확인예정\n- 경남 함양 농가 테스트 진행\n- 2세농가 70두 가량 사육(번식40두)\n 나노비타믹스 20kg 샘플 제공\n나) 설사72 제품 관심표명 \n- 1box 샘플 제공 -> 농가 적용후 결과 확인예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한우협회 거창군지부","지원동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781738134888169","msg_ts":"1781738134.888169"},{"date":"2026-06-18","raw_text":"작성일자*\n2026-06-18\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)부경양돈 / 김덕민 계장\n가)라이신 입찰 관련 사항 논의\n- 황산염 / 염산염 中 1개원료 선택 입찰참여 희망\n- 최종 황산염라이신 입찰 참여하기로함\n나)ECM 4,800kg 주문 및 발송요청함\n-23일(화) 입고예정\n\n2)합천돼지자가/ 유정례 실장\n가) 원료 시황 공유\n- 인산칼슘 , 염화콜린 시황 공유\n나)황산염 라이신 스팟 공급 관련 문의\n- CJ 라이신 99% 사용 (2,500원)\n- 관련사항 배합비 담당자 논의예정\n\n3)고려산업 / 전민규 차장\n가) 원료 시황 공유\n- 라이신 , 인산칼슘 ,메치오닌 등 \n- 농협사료 입찰결과 공유 \n황산염라이신 950 희우 염산염라이신 1523 아이넷\n나)고려산업 입찰관련 문의\n-원료별 2~3개월 공급 입찰 진행 가능성有\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부경양돈","합천돼지자가","고려산업"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1781821457069409","msg_ts":"1781821457.069409"},{"date":"2026-06-19","raw_text":"작성일자*\n2026-06-19\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 오케이 / 류하나 부장\n가) 인산칼슘 시황 공유 \n- 7월 단가 인상안 전달 \n-1560원->1700원 인상완료\n나)농가 테스트 관련 논의\n- 농가 지도계 담당직원 소개 요청\n- 경남 5개 농가 거래중 \n- 의성농가 합병 관련 시간소요 예상\n\n2)오앤티 /공제우 부장\n가) 라이신 , 메치오닌 시황 공유\n- 각 원료 MSDS 전달 요청 /완료\n\n3)우림피드 / 실장\n가)취급원료 적용 논의\n- 보호지방 , 비타민 적용 관련 사항 문의\n나) 뉴트리신 제품 농가 홍보 위한 팜플렛 비치\n- 나노비타믹스 , 파인애플분말 소개\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["오케이","오앤티","우림피드"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782086524141839","msg_ts":"1782086524.141839"},{"date":"2026-06-22","raw_text":"작성일자*\n2026-06-22\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 함양 농가 / 임정호 대표\n가) 70여두 (번식40두)\n- 현재 재귀발정 지연 /수태율 저하 농가\n-분만 60일 이상 경과해도 발정오지 않는 개체 12두\n- 일부개체 6~7회 수정후에도 임신 실패\n- 인공수정후 진단시에도 음성 판정 다수\n- 수태율 저하 원인 해결에 대한 고민 큼\n->나노비타믹스 샘플 20kg 급여후 확인예정\n나)기타 뉴트리신 제품 소개 및 적용요청\n\n2)통일동물병원 / 백원원 원장\n가)설사 72 관련 문의\n나) 관납 진행 관련 논의\n- 언양 가축약품 통해 진행건 아직 진행못함\n- 지역 한우협회 지부장 추천받아 군청 지원사업 품목\n  채택방식 논의예정\n\n3)부경양돈 / 김덕민 계장\n가)ECM 입고 및 코코시스 50% 입고 관련 문의\n- 익일 50% 1,000kg 입고 가능여부 확인요청\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["함양 농가","통일동물병원","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782169566402199","msg_ts":"1782169566.402199"},{"date":"2026-06-23","raw_text":"작성일자*\n2026-06-23\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 부경양돈/ 김덕민 계장\n가)황산염라이신 입찰\n참가업체 : 세인, 세계로케미칼, 희우코리아, 은진바이오, CSF ,ENT\nCSF 낙찰 : 874원\n나)메치오닌 관련 논의\n- 희우 7월 8200원 견적 제출 \n- 현재 수급상황 좋지 않음 \n- CJ 물량으로 공급하려 하나 CJ도 물량 많지 않음\n- 목요일 견적 전달하기로함\n다) 코코시스 1,600kg 주문 및 발송요청함\n24일 (수) 입고예정\n\n2)김해축협 / 정한상 과장\n가)인산칼슘 시황 공유\n-DCP 단가 전달 요청 (월4`5톤 사용)\n- 1520원 견적 전달 (1대 발주기준)\n나)코코넛 분말 관련 논의\n- 다볼에서 계속 공급,.단가 변동 없음\n다)아미노산제 시황 공유\n\n3) 오앤티 / 공제우 부장\n가) 아미노산 시황 공유\n- 염산염라이신 1650원 /메치오닌 7700원 견적 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부경양돈","김해축협","오앤티"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782343226875849","msg_ts":"1782343226.875849"},{"date":"2026-06-24","raw_text":"작성일자*\n2026-06-24\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)대덕농산 /최병기 대표\n가)원료별 시황 공유\n- 보호지방 . 염화콜린 시황 전달 및 배합가능여부 확인\n- 비타민 공급 관련 문의\n- 완제품에 비타민 첨가되어 있어 따로 필요하지 않음\n- 단일 비타민 제품 농가 개별 공급하기도 함\n\n2)천년TMF / 조광제 상무\n가)원료 시황 논의 \n- 메치오닌 시황 및 단가 공유\n- 하절기 대비 보호지방 공급 문의/ 구간마다 나눠 적용\n나) 부산물 사용 관련 문의\n- 단가 낮은 부산물 위주로 사용중 (버섯배지) \n- 파인애플사일리지 소개 및 적용 요청\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["대덕농산","천년TMF"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782343252040469","msg_ts":"1782343252.040469"},{"date":"2026-06-25","raw_text":"작성일자*\n2026-06-25\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)한우협회 고성군 지부/ 실장\n가)뉴트리신 제품 소개 및 홍보\n- 지부내 홍보물 비치 및 제품 설명\n나)지원사업 관련 문의\n- 올해 설사예방제 구충제 진행\n- 지원사업 진행 동물병원 소개 요청\n- 사무국장 직접 연락해보기로함\n\n2)한려프리믹스 / 김행봉 대표\n가)원료 시황 공유\n- 대두박 , 아미노산제 시황 공유\n- 대두박 지인통해 전라도에서 공급 받음 \n- 단일 비타민 및 메치오닌 시황 및 단가 전달\n나)난황분말 소개 및 적용가능여부 확인\n\n3)코리아에프앤에프 / 구본석 차장\n가)원료 시황 공유\n- 대두박 익일 전달 및 인산칼슘 시황 공유\n- MCP 단가 인상 관련 사항 전달\n- MCP 소포장 1,000kg 주문 및 발송요청함\n나)난황분말 소개 및 적용가능여부 확인요청\n- 대표님과 논의후 피드백 주기로함\n\n4)부경양돈 / 김덕민 계장\n가)메치오닌 3분기 견적 전달 요청\n- 7900원/ kg 견적 전달\n-7월 7800원/kg 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한우협회 고성군 지부","한려프리믹스","코리아에프앤에프","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782428913492239","msg_ts":"1782428913.492239"},{"date":"2026-06-26","raw_text":"작성일자*\n2026-06-26\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) KB 동물병원 / 임권빈 원장\n가) 뉴트리신 제품 판매요청\n-양돈 /양계 농가 비타쎄 적용 요청\n 제품 홍보물 전달\n-비타쎄 테스트 관련 사항 논의\n\n2) 한승트레이딩 / 한창수 대표\n가)제품 소개 및 판매방안 논의\n- 나노비타믹스 / 비타쎄 제품 양돈 양계 적용 \n- 단가 전달 및 제품 포인트 재공유\n나)농가 테스트 관련 사항 문의\n- 현재 두군데 접촉 / 오케이 2주내 접촉 및 관련 사항 공유\n\n3) 양산기장TMR / 김기윤 팀장\n가) 원료 시황 공유\n- 보호지방 , 염화콜린 시황 전달 \n나)파인애플 사일리지 적용 요청\n- 대략적인 단가 전달 / 논의후 결정하기로함\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["KB 동물병원","한승트레이딩","양산기장TMR"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782690023334949","msg_ts":"1782690023.334949"},{"date":"2026-06-29","raw_text":"작성일자*\n2026-06-29\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)대한 산란계협회 양산김해지부 / 류원한 지부장\n가)회사 소개 및 제품 소개\n- 나노비타쎄 소개 및 테스트 가능여부 확인\n- 테스트 불가 / 제품 접목 농장 데이터 전달 요청\n- 농가 테스트 결과 취합 정리 익일 전달예정\n (농가 테스트 결과 확인후 사용여부 결정)\n\n2)대한 산란계협회 부산경남도지회 \n- 금일 출근직원 없어 추후 방문예정\n\n3)오앤티 / 공제우 부장\n가)메치오닌 / 염산염 라이신 시황 공유\n- 자료 전달 및 발주 시기 확인 요청\n\n4)미소인터내셔널 / 유자현 대리\n가)비타민D3 25kg 주문 및 발송요청함\n-7월1일 (수)입고예정\n\n5)코리아에프앤에프 /구본석 차장\n가) 대두박 시황 공유\n- 전월 동가 진행 전달 및 퀄리티 낮은 대두박 희망 \n나) 대두박 계산서 요청\n- 익일 전달 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["대한 산란계협회 양산김해지부","오앤티","미소인터내셔널","코리아에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782776159442049","msg_ts":"1782776159.442049"},{"date":"2026-06-30","raw_text":"작성일자*\n2026-06-30\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)한우협회 함안군지부 / 송우열 사무국장\n가)제품 피드백 및 판매확대 방안 논의\n- 이지스타터 3개월 급여중\n- 현재 효과 확신하기에 이르다는 입장\n(출하시 체형 , 윤기,판매가 등 최종확인후 피드백예정)\n나)비타민 제품 관련 문의\n- 시범사업 제품 (누보 / 카로틴) 사용중/ 종료예정\n- 제품 효과 확인시 향후 협회 지원사업 후보로 검토 가능\n (카로틴 제품 소진시 나노비타믹스 사용예정)\n\n2)한우협회 함안군 지부/ 이홍섭 지부장\n가) 제품 판매확대 및 일정 공유\n-금일 오전 협회 이사회 진행 /3분기 계획 일정 미정\n- 지원사업건 실장통해 문의요청 \n나) 뉴트리신 제품 소개 및 적용요청\n- 함안농가 이한섭 대표 동행 미팅 진행\n \n3)노엘목장 / 신창호 대표\n가) 파인애플 분말 100kg 주문 및 발송요청함\n-7월1일(수) 입고예정\n\n4) 코리아에프앤에프 / 구본석 차장\n가) 6월 계산서 발행요청 및 진행\n- MCP / 대두박\n\n5)시현축산 / 하광봉 대표\n가) 거래명세서 전달 및 입금요청\n- 비테인염산염\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한우협회 함안군지부","한우협회 함안군 지부","노엘목장","코리아에프앤에프","시현축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782864884327949","msg_ts":"1782864884.327949"},{"date":"2026-07-01","raw_text":"작성일자*\n2026-07-01\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)영광축산 / 박현규 대표\n가)뉴트리신 제품 적용 관련 문의\n- 장프로 적용 관련 최근 적용시작해서 차주까지 급여 \n  이후 결과 논의 가능 \n나)제품 판매확대 방안 논의\n- 종합동물약품 대표와 통화\n-경남수의약품과 판매공조중\n(나노비타믹스 효과 및 장프로 적용중인 사항 공유해줌)\n- 종합동물약품 대표와 추후 미팅진행하기로함\n\n2) 합천축협 / 신성한 과장\n가) 원료 시황 공유\n- MDCP 보호지방 코코넛등 \n나) 적용가능 원료 논의\n- MDCP 적용 관련 문의 \n- 자세한 내용 차주 김민수 과장 미팅 진행하기로함\n  (유선통화로 일정 논의 진행)\n\n3)오앤티 / 공제우 부장\n가) 원료 시황 공유 및 입고일 \n- 메치오닌 월 1톤 사용 / 액상메치오닌 5톤 사용\n- 염산염라이신 7월말정도 입고 예상\n나) 타원료 접목 여부 확인 요청\n- 취급품목리스트 전달\n\n4)거창소재 농가\n가) 설사 72 관련 문의\n- 사용법 전달 및 뉴트리신 제품 홍보물 전달\n\n5)백제약품/이성진 이사\n가)초유아이지 판매 관련 문의\n- 현재 판매중인 제품 현황 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["영광축산","합천축협","오앤티","백제약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1782948930301619","msg_ts":"1782948930.301619"},{"date":"2026-07-02","raw_text":"작성일자*\n2026-07-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)마산가축동물병원 / 김동호 원장\n가) 비타민 제재 사용 관련 문의\n- 양어 비타민 원재 사용문의\n- 대부분 비타민EC 제재 사용 및 봄 또는 출하 한두달 전에 급여\n나)뉴트리신 제품 소개\n- 첨가제 비치 거의 하지 않고 필요시 업체 연락해 판매\n- 의약품 위주 판매중 \n- 뉴트리신 홍보물 전달 및 판매요청\n\n2)사천수산동물병원 / 이장희 대표\n가)비타민 제재 사용 관련 문의\n- 양어 비타민 소량판매중 (유니아아쿠아 제품)\n- EC 제재 이외 단일 비타민은 거의 판매 하지 않음\n- 경북수산 공급 방향 전달 -> 어가 연락시 판매공조 하기로함\n\n3)부경양돈 / 김덕민 계장\n가) 메치오닌 7월 적용 관련 논의\n- 1개월 3개월 견적 관련 결과 논의\n- 1개월 견적시 희우 8200원 ->3개월 7500원 견적서 전달\n- CJ 1개월 8350원 / 3개월 8220원 견적 전달\n- 3분기 희우 공급예정 (회원조합 입찰결과 또는 시세 모니터링후 논의)\n- 9월말 이후 다시 가격 검토예정\n나) ECM 4,800kg 주문 및 발송요청함\n -6일(월) 입고예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["마산가축동물병원","사천수산동물병원","부경양돈"],"permalink":"https://sei   const WEEKDAYS = ['일','월','화','수','목','금','토'];

  const byDate = new Map();
  REPORTS.forEach(r => byDate.set(r.date, r));

  let dates = REPORTS.map(r => r.date).sort();
  let viewYear, viewMonth;
  if (dates.length){
    const last = new Date(dates[dates.length-1] + 'T00:00:00');
    viewYear = last.getFullYear();
    viewMonth = last.getMonth();
  } else {
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
  }
  let selectedDate = null;
  let searchQuery = '';
  let returnQuery = null;

  const calGrid = document.getElementById('calGrid');
  const monthLabel = document.getElementById('monthLabel');
  const mainPanel = document.getElementById('mainPanel');
  const searchInput = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearBtn');
  const searchHint = document.getElementById('searchHint');

  function fmtWeekday(dateStr){
    return WEEKDAYS[new Date(dateStr+'T00:00:00').getDay()];
  }
  function fmtLabel(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  }
  function todayStr(){
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function highlight(text, q){
    if(!q) return escapeHtml(text);
    const esc = escapeHtml(text);
    const escQ = escapeHtml(q);
    try{
      const re = new RegExp(escQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
      return esc.replace(re, m => `<mark>${m}</mark>`);
    }catch(e){ return esc; }
  }

  function renderCalendar(){
    monthLabel.textContent = `${viewYear}년 ${viewMonth+1}월`;
    calGrid.innerHTML = '';
    const firstDow = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const t = todayStr();

    for(let i=0;i<firstDow;i++){
      const pad = document.createElement('div');
      pad.className = 'day pad';
      calGrid.appendChild(pad);
    }
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cell = document.createElement('div');
      const has = byDate.has(dateStr);
      let cls = 'day';
      if(has) cls += ' has-report';
      if(dateStr === t) cls += ' is-today';
      if(dateStr === selectedDate) cls += ' selected';
      if(searchQuery && has){
        const r = byDate.get(dateStr);
        const hay = (r.clients||[]).join(' ') + ' ' + r.raw_text;
        if(hay.toLowerCase().includes(searchQuery.toLowerCase())) cls += ' match-glow';
      }
      cell.className = cls;
      cell.innerHTML = `<span class="tnum">${d}</span>${has ? '<span class="dot"></span>' : ''}`;
      if(has){
        cell.addEventListener('click', () => {
          searchQuery = '';
          returnQuery = null;
          searchInput.value = '';
          clearBtn.style.display = 'none';
          searchHint.textContent = '거래처명을 입력하면 방문/보고 이력을 모두 찾아드려요.';
          selectedDate = dateStr;
          renderCalendar();
          renderDetail(dateStr);
        });
      }
      calGrid.appendChild(cell);
    }
  }

  function renderDetail(dateStr){
    const r = byDate.get(dateStr);
    if(!r){
      renderEmpty();
      return;
    }
    const pills = (r.clients||[]).map(c =>
      `<span class="pill" data-client="${escapeHtml(c)}">${escapeHtml(c)}</span>`
    ).join('');
    const backBtn = returnQuery
      ? `<button class="back-btn" id="backToSearchBtn">← “${escapeHtml(returnQuery)}” 검색 결과로</button>`
      : '';
    mainPanel.innerHTML = `
      ${backBtn}
      <div class="report-head">
        <h2>${fmtLabel(r.date)}<span class="weekday">${fmtWeekday(r.date)}요일</span></h2>
        ${r.permalink ? `<a class="permalink" href="${r.permalink}" target="_blank" rel="noopener">Slack 원본 보기 ↗</a>` : ''}
      </div>
      ${pills ? `<div class="client-pills">${pills}</div>` : ''}
      <div class="report-body">${escapeHtml(r.raw_text.trim())}</div>
    `;
    mainPanel.querySelectorAll('.pill').forEach(p => {
      p.addEventListener('click', () => {
        const c = p.getAttribute('data-client');
        searchInput.value = c;
        onSearchInput(c);
      });
    });
    const backBtnEl = document.getElementById('backToSearchBtn');
    if(backBtnEl){
      backBtnEl.addEventListener('click', () => {
        const q = returnQuery;
        searchQuery = q;
        searchInput.value = q;
        clearBtn.style.display = 'block';
        searchHint.textContent = `달력에서 초록 테두리로 표시된 날짜에도 결과가 있어요.`;
        renderCalendar();
        renderResults(q);
      });
    }
  }

  function renderEmpty(){
    mainPanel.innerHTML = `
      <div class="empty-state">
        <div class="heading">날짜를 선택해 보세요</div>
        <div>왼쪽 달력에서 점이 찍힌 날짜를 누르면 그날의 업무보고 전체 내용을 볼 수 있어요.</div>
      </div>
    `;
  }

  function renderResults(q){
    const ql = q.toLowerCase();
    const matches = REPORTS.filter(r => {
      const clientHit = (r.clients||[]).some(c => c.toLowerCase().includes(ql));
      const textHit = r.raw_text.toLowerCase().includes(ql);
      return clientHit || textHit;
    }).sort((a,b) => a.date < b.date ? 1 : -1);

    if(!matches.length){
      mainPanel.innerHTML = `
        <div class="results-head">
          <h2>검색 결과</h2>
          <span class="count">0건</span>
        </div>
        <div class="no-results">“${escapeHtml(q)}”와(과) 일치하는 업무보고가 없어요.</div>
      `;
      return;
    }

    const items = matches.map(r => {
      const idx = r.raw_text.toLowerCase().indexOf(ql);
      let snippetSource;
      if(idx >= 0){
        const start = Math.max(0, idx - 24);
        snippetSource = (start>0?'…':'') + r.raw_text.slice(start, idx+ql.length+40).replace(/\n/g,' ') + '…';
      } else {
        snippetSource = r.raw_text.slice(0,90).replace(/\n/g,' ') + '…';
      }
      return `
        <div class="result-item" data-date="${r.date}">
          <div class="r-top">
            <span class="r-date tnum">${fmtLabel(r.date)}</span>
            <span class="r-weekday">${fmtWeekday(r.date)}요일</span>
          </div>
          <div class="r-snippet">${highlight(snippetSource, q)}</div>
        </div>
      `;
    }).join('');

    mainPanel.innerHTML = `
      <div class="results-head">
        <h2>“${escapeHtml(q)}” 검색 결과</h2>
        <span class="count">${matches.length}건</span>
      </div>
      <div class="result-list">${items}</div>
    `;

    mainPanel.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const d = el.getAttribute('data-date');
        const parts = d.split('-').map(Number);
        viewYear = parts[0]; viewMonth = parts[1]-1;
        selectedDate = d;
        returnQuery = q;
        searchQuery = '';
        searchInput.value = '';
        clearBtn.style.display = 'none';
        searchHint.textContent = '거래처명을 입력하면 방문/보고 이력을 모두 찾아드려요.';
        renderCalendar();
        renderDetail(d);
      });
    });
  }

  function onSearchInput(q){
    searchQuery = q.trim();
    clearBtn.style.display = searchQuery ? 'block' : 'none';
    renderCalendar();
    if(searchQuery){
      searchHint.textContent = `달력에서 초록 테두리로 표시된 날짜에도 결과가 있어요.`;
      renderResults(searchQuery);
    } else {
      searchHint.textContent = '거래처명을 입력하면 방문/보고 이력을 모두 찾아드려요.';
      if(selectedDate) renderDetail(selectedDate);
      else renderEmpty();
    }
  }

  searchInput.addEventListener('input', e => onSearchInput(e.target.value));
  clearBtn.addEventListener('click', () => { searchInput.value=''; onSearchInput(''); searchInput.focus(); });

  document.getElementById('prevMonth').addEventListener('click', () => {
    viewMonth--; if(viewMonth<0){ viewMonth=11; viewYear--; }
    renderCalendar();
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    viewMonth++; if(viewMonth>11){ viewMonth=0; viewYear++; }
    renderCalendar();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    const n = new Date();
    viewYear = n.getFullYear(); viewMonth = n.getMonth();
    renderCalendar();
  });

  renderCalendar();
  renderEmpty();
</script>
