<title>박제영 업무보고 아카이브</title>
<style>
  :root{
    --paper:#E9E6DC;
    --surface:#FAF8F2;
    --ink:#23261F;
    --ink-soft:#5B5C4F;
    --line:rgba(35,38,31,0.14);
    --accent:#A9761F;
    --accent-soft:rgba(169,118,31,0.14);
    --deep:#35543F;
    --deep-soft:rgba(53,84,63,0.12);
    --shadow: 0 1px 2px rgba(35,38,31,0.06), 0 6px 20px rgba(35,38,31,0.07);
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#14150F;
      --surface:#1D1F17;
      --ink:#E7E3D3;
      --ink-soft:#A9A791;
      --line:rgba(231,227,211,0.14);
      --accent:#D9A83B;
      --accent-soft:rgba(217,168,59,0.16);
      --deep:#6FA98C;
      --deep-soft:rgba(111,169,140,0.14);
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
    }
  }
  :root[data-theme="dark"]{
    --paper:#14150F; --surface:#1D1F17; --ink:#E7E3D3; --ink-soft:#A9A791;
    --line:rgba(231,227,211,0.14); --accent:#D9A83B; --accent-soft:rgba(217,168,59,0.16);
    --deep:#6FA98C; --deep-soft:rgba(111,169,140,0.14);
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"]{
    --paper:#E9E6DC; --surface:#FAF8F2; --ink:#23261F; --ink-soft:#5B5C4F;
    --line:rgba(35,38,31,0.14); --accent:#A9761F; --accent-soft:rgba(169,118,31,0.14);
    --deep:#35543F; --deep-soft:rgba(53,84,63,0.12);
    --shadow: 0 1px 2px rgba(35,38,31,0.06), 0 6px 20px rgba(35,38,31,0.07);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Apple SD Gothic Neo", sans-serif;
    font-size:15px;
    line-height:1.55;
    min-height:100vh;
  }
  ::selection{ background:var(--accent-soft); }

  .heading{
    font-family: Georgia, "Noto Serif KR", ui-serif, serif;
    letter-spacing:-0.01em;
    text-wrap:balance;
  }
  .tnum{ font-variant-numeric: tabular-nums; }

  a{ color:inherit; }

  .app{
    max-width:1180px;
    margin:0 auto;
    padding: 28px 20px 64px;
  }

  header.top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  header.top .title-block h1{
    font-size:26px;
    margin:0 0 4px;
    font-weight:700;
  }
  header.top .title-block p{
    margin:0;
    color:var(--ink-soft);
    font-size:13.5px;
  }

  .layout{
    display:grid;
    grid-template-columns: 340px 1fr;
    gap:20px;
    align-items:start;
  }
  @media (max-width: 860px){
    .layout{ grid-template-columns: 1fr; }
  }

  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  /* search */
  .search-wrap{ padding:16px; }
  .search-box{
    position:relative;
    display:flex;
    align-items:center;
  }
  .search-box svg{
    position:absolute; left:12px; width:16px; height:16px; opacity:0.55; pointer-events:none;
  }
  .search-box input{
    width:100%;
    padding:10px 12px 10px 36px;
    border-radius:8px;
    border:1px solid var(--line);
    background: var(--paper);
    color:var(--ink);
    font-size:14.5px;
    outline:none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .search-box input:focus{
    border-color:var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-box .clear-btn{
    position:absolute; right:8px;
    border:none; background:none; color:var(--ink-soft);
    cursor:pointer; font-size:16px; line-height:1; padding:4px;
    border-radius:6px;
    display:none;
  }
  .search-box .clear-btn:hover{ background:var(--line); }
  .search-hint{
    margin:8px 2px 0;
    font-size:12px;
    color:var(--ink-soft);
  }

  /* calendar */
  .cal{ padding: 4px 16px 16px; }
  .cal-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 2px 6px;
  }
  .cal-nav .month-label{
    font-family: Georgia, "Noto Serif KR", ui-serif, serif;
    font-size:16.5px;
    font-weight:700;
  }
  .cal-nav button{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    width:30px;height:30px;
    border-radius:7px;
    cursor:pointer;
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .cal-nav button:hover{ border-color:var(--accent); color:var(--accent); }
  .cal-nav .nav-btns{ display:flex; gap:6px; }
  .cal-nav .today-btn{
    border:1px solid var(--line);
    background:none;
    color:var(--ink-soft);
    font-size:12px;
    padding:5px 9px;
    border-radius:7px;
    cursor:pointer;
  }
  .cal-nav .today-btn:hover{ color:var(--accent); border-color:var(--accent); }

  .dow-row{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    margin-top:8px;
  }
  .dow-row span{
    text-align:center;
    font-size:11px;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    padding-bottom:4px;
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:3px;
  }
  .day{
    position:relative;
    aspect-ratio:1/0.86;
    border-radius:7px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:12.5px;
    cursor:default;
    color:var(--ink-soft);
    background:transparent;
    border:1px solid transparent;
  }
  .day.pad{ visibility:hidden; }
  .day.has-report{
    color:var(--ink);
    cursor:pointer;
    background:var(--paper);
    border-color:var(--line);
  }
  .day.has-report:hover{
    border-color:var(--accent);
  }
  .day.has-report .dot{
    width:5px;height:5px;border-radius:50%;
    background:var(--accent);
    margin-top:2px;
  }
  .day.is-today{ font-weight:700; }
  .day.is-today::after{
    content:"";
    position:absolute; inset:2px;
    border:1px solid var(--deep);
    border-radius:6px;
    pointer-events:none;
    opacity:0.55;
  }
  .day.selected{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .day.selected .dot{ background:#fff; }
  .day.match-glow{
    box-shadow: 0 0 0 2px var(--deep) inset;
  }

  .legend{
    display:flex; align-items:center; gap:6px;
    font-size:11.5px; color:var(--ink-soft);
    margin-top:10px; padding-top:10px;
    border-top:1px solid var(--line);
  }
  .legend .dot{ width:5px;height:5px;border-radius:50%; background:var(--accent); }

  /* main detail area */
  .main-panel{ padding:22px 26px; min-height:520px; }

  .empty-state{
    display:flex; flex-direction:column; align-items:flex-start;
    gap:8px; color:var(--ink-soft); padding:40px 4px;
  }
  .empty-state .heading{ color:var(--ink); font-size:18px; }

  .report-head{
    display:flex; align-items:baseline; justify-content:space-between;
    flex-wrap:wrap; gap:10px;
    padding-bottom:14px; margin-bottom:16px;
    border-bottom:1px solid var(--line);
  }
  .report-head h2{
    font-size:21px; margin:0; font-weight:700;
  }
  .report-head .weekday{ color:var(--ink-soft); font-size:13px; font-weight:400; margin-left:8px; }
  .report-head a.permalink{
    font-size:12.5px; color:var(--deep);
    text-decoration:none;
    border:1px solid var(--line);
    padding:5px 10px; border-radius:7px;
    white-space:nowrap;
  }
  .report-head a.permalink:hover{ border-color:var(--deep); }

  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:12.5px;
    padding:6px 12px;
    border-radius:7px;
    cursor:pointer;
    margin-bottom:14px;
  }
  .back-btn:hover{ border-color:var(--deep); color:var(--deep); }

  .client-pills{
    display:flex; flex-wrap:wrap; gap:6px;
    margin-bottom:16px;
  }
  .pill{
    font-size:12px;
    padding:4px 10px;
    border-radius:999px;
    background:var(--deep-soft);
    color:var(--deep);
    cursor:pointer;
    border:1px solid transparent;
  }
  .pill:hover{ border-color:var(--deep); }

  .report-body{
    white-space:pre-wrap;
    font-size:14.5px;
    line-height:1.75;
    color:var(--ink);
    max-width:66ch;
  }
  .report-body mark{
    background:var(--accent-soft);
    color:inherit;
    border-radius:3px;
    padding:0 2px;
  }

  /* search results */
  .results-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:14px; flex-wrap:wrap; gap:8px;
  }
  .results-head h2{ font-size:19px; margin:0; font-weight:700; }
  .results-head .count{ color:var(--ink-soft); font-size:13px; }
  .result-list{ display:flex; flex-direction:column; gap:2px; }
  .result-item{
    display:flex; flex-direction:column; gap:4px;
    padding:13px 12px;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
  }
  .result-item:hover{ background:var(--paper); border-color:var(--line); }
  .result-item .r-top{
    display:flex; align-items:baseline; gap:10px;
  }
  .result-item .r-date{
    font-weight:700; font-size:13.5px;
    font-family: Georgia, "Noto Serif KR", ui-serif, serif;
  }
  .result-item .r-weekday{ font-size:12px; color:var(--ink-soft); }
  .result-item .r-snippet{
    font-size:13px; color:var(--ink-soft);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .result-item .r-snippet mark{
    background:var(--accent-soft); color:var(--ink); border-radius:3px; padding:0 2px;
  }
  .no-results{ color:var(--ink-soft); padding:40px 4px; }

  footer.foot{
    margin-top:26px;
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
  }

  @media (prefers-reduced-motion: no-preference){
    .day, .pill, .result-item, .search-box input{ transition: background-color .12s ease, border-color .12s ease, color .12s ease; }
  }
</style>

\n\n3) 고려산업 / 전민규 차장\n입찰결과 확인 \n - 금일 오후 통화연결 되지 않아 익일 세부사항 조사예정\n - 오전 대경양돈 박준우 과장 관련 사항 문의\n2.특이사항\n없음\n3.사장님 보고사항\n없음","clients":["천년TMF영농조합","경주매일낙우회","고려산업"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750118306833939","msg_ts":"1750118306.833939"},{"date":"2025-06-17","raw_text":"6월17일 업무보고\n\n1.일반사항\n1) 오케이 / 류하나 부장\nMDCP 시황전달 및 재고 파악요청\n비타릭 소개 및 실험 적용 가능 농가 문의\n - 의성농장 적용이 좋을것으로 판단\n - 의성농장 불가시 거래 농가중 규모 큰 농가 소개 요청함\n\n2) 하나가축약품 / 김대원 대표\n신제품 소개 및 농가 적용 요청함\n - 닥터N ,비타민.블럭 , 초유 아이지 등\n - 나노비타믹스 , 장프로 팜플렛 비치\n동물 의약품 위주 비치 되어 있어 첨가제 라인업 비치의견 제시\n\n3)부산사료 / 김지은 과장\n하이팻2톤 주문 및 발송 요청함\n24일(화) 입고 예정\n\n4)고려산업 / 전민규 차장\n입찰품목 관련 논의\na) MDCP \n10개 업체 참여 \n1등 CSF 928\n2등 중앙석고 1079\n7등 세인 1082\n\nb) 트레오닌 \n14개 업체 참여\n1등 CSF 1673\n2등 SEM코리아 1690\n3등 더키움바이오 1750(푸펑)\n대상(푸펑) , 참트레이딩 등 참여\n9등 해우 1808\n\nC) 메치오닌 분말\n5개 업체 참여\n1등 SEM코리아 3380\n2등 해우 3730\n\nd)메치오닌 액상\n3개 업체 참여\n1등 유수현 부장이 차린회사 3000\n2등 뉴브리드(아디쎄오)3030\n3등 희우4000\n\ne) 황산염 라이신\n11개 업체 참여\n1등 CSF 928\n2등 피드바이오텍 990\n3등 이앤티995\n4등 SEM코리아 997\n5등 희우1000\n6등 세계로 1018\n7등 대현교역 1045\n8등 아이넷피드1050\n9등 세인 1069\n10등 은진바이오 1070\n11등 골든게인 1075\n\n2.특이사항\n없음\n3.대표님 보고사항\n없음","clients":["오케이","하나가축약품","부산사료","고려산업"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750204838295829","msg_ts":"1750204838.295829"},{"date":"2025-06-18","raw_text":"6월18일 업무보고\n1.기본사항\n1)영천티엠알 / 실장\n코코시스 소개 및 배합비 적용 가능여부 확인요청\n부산물 적용검토\n - 현재 부산물 사용하고 있지 않음\n신제품 소개 및 홍보 요청\n - 비타블럭 ,초유아이지 \n\n2)함안낙농영농조합/제선연 실장\n비타민 프리믹스 관련 논의\n-현재 배합사료 내의 비타민으로 사용중이며 부족시 농가 개별적으로 구매해 사용\n-농가 위주 프리믹스 제안\n\n3)마산가축약품 / 김동호 원장\n대가축->소가축 위주 변경중\n ->제품판매는 구분없이 진행중\n신제품 소개 및 판매요청함\n -  초유아이지, 닥터N , 비타블럭 \n양어 약품 및 첨가제 판매중\n -비타민 C 97%  , 비테인 소개  \n\n4) 오케이 / 류하나 부장\n닥터릭 농가실험 관련 논의\n - 자체 농장 실험 힘들것으로 예상\n - 대체 오케이에서 사료 공급중인 농가 컨택 예정\n (1차 컨택 예정농가 :경남 고성군 소재 8만수 농가)\n\n2.특이사항\n없음\n\n3.대표보고 및 지시사항\nFiles: 초유아이지_전략.docx (ID: F0921UH7CDA, application/vnd.openxmlformats-officedocument.wordprocessingml.document, 31.1 KB)","clients":["영천티엠알","함안낙농영농조합","마산가축약품","오케이"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750288727466259","msg_ts":"1750288727.466259"},{"date":"2025-06-19","raw_text":"6월19일 업무보고\n1.일반시항\n1)영광가축약품 / 이은종 대표\n양돈 위주 동물의약품 및 첨가제 판매\n신제품 소개 및 판매 요청함\n-나노비타믹스 , 장프로 팜플렛 전달\n제품은 긍정적으로 판단\n마진과 가격대로 인해 판매를 어떻게 할것인지 내부 논의가 필요하다함 \n\n2) 김해축협 / 정한상 과장\n인산칼슘 및 아미노산 공급 문의\n-트레오닌 , 라이신 시장 단가 및 최근 입찰 관련 \n사항 공유\n보호지방 취급여부 문의\n-메가팻 , 하이팻 소개 \n-당장 배합비 적용 부분은 아니며 정보 확인차 문의 \n\n3) 낙농육우협회 밀양시지부/간사\n지원사업 관련 문의\n-비타민 프리믹스 선정했으나 지원금 문제로 하반기 지원 품목 없을것으로 예상\n취급품목 리스트 비치후 단일 원료 칮는 농가 연결 요청\n신제품 홍보 및 협회 내 팜플렛 비치\n- 나노비타믹스 , 초유아이지 , 비타블럭\n\n2.특이사항\n없음\n3.대표 특별보고 및 지시사항\n없음","clients":["영광가축약품","김해축협","낙농육우협회 밀양시지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750377475166799","msg_ts":"1750377475.166799"},{"date":"2025-06-23","raw_text":"작성일자*\n2025-06-23\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1) 동성동물약품 / 실장\na)경남 함안군 소재\n   2016년~현재\nb)낙농 , 한우 ,양돈 모든 약품 취급중\n-> 양돈 비율 가장큼\nc)신제품 소개 및 자료 전달\n-나노비타믹스 , 징프로 \n대표 외부 일정으로 유선 통화 및 재미팅 하기로함\n\n2) 금석수산 (뉴월드 아쿠아) / 김정순 대표\na)금석수산-경남 고성군 소재\n   뉴월드아쿠아-경남 진주 소재\nb)주문 및 발송요청함\n비테인 98% 1톤 \n비타민C99% 750kg\n선입금 조건 (입금 완료) 출고 진행\n\n3) 통일 동물병원 / 백원원 원장\na)신제품 관련 사항 논의 및 추가 계획 논의\n-나노비타믹스, 장프로 \n금주중 양돈 농가 미팅 일정 픽스.예정\nb)부산우유 이현주 부장통화 및 블럭 제품 관련 문의\n세일애니팜- 피토블럭 공급중\nc) 병원내 제품 전시 및 홍보방안 논의\n*2. 특이사항 (신규발생 및 이슈발생)*\n신규 - 금석수산\n*3. 대표 특별보고 및 지시사항* \n없음","clients":["동성동물약품","금석수산 (뉴월드 아쿠아)","통일 동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750719493615799","msg_ts":"1750719493.615799"},{"date":"2025-06-24","raw_text":"작성일자*\n2025-06-24\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1) 경남가축약품 / 최성호 대표\n가)신제품 설명 및 판매 요청함\n-나노비타믹스, 비타블럭, 초유아이지 \n 의약품 위주 판매 진행중이며 가끔 농가에서 구매요청시 판매중\n초유아이지 내부 논의후 연락주기로함\n\n2) 산청조섬유TMF / 조춘래 소장\n가) 보호지방 사용 관련 문의\n-기존 사용하지 않는 원료라 시간을 두고 논의 및 투입여부 결정 예정\n나) 부산물 투입 관련 문의\n버섯배지 사용중 \n단가가 낮고 미생물 배양에 좋은 원료 사용\n이외 에너지원 사용될 원료 소개요청\n\n3) 경남수의동물병원 / 임권빈 원장\n금일 진주에서 미팅 진행 예정이었으나 빗길 사고로\n인해 취소됨\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["경남가축약품","산청조섬유TMF","경남수의동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750806814233469","msg_ts":"1750806814.233469"},{"date":"2025-06-25","raw_text":"작성일자*\n2025-06-25\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1)대덕농산/최병기 대표\n가)취급원료 관련 논의\n-중조 ,당밀은 올해 사용가능량 비축해둔 상태\n비타민 소량 사용 기본베이스 사료로 대체중\n나) 부산물 사용 문의\n여름철 관리 어려움으로 인해 사용하지 않음\nex)파인애플 사일리지 \n원료 필요시 견적 요청예정\n\n2) 안강연합낙우회 / 허재복 대표 \n가)코코넛 분말 사용 관련 논의\n-면실 비트 곰팡이독소 대체 사용 \n나)신제품 홍보 및 판촉\n- 나노비타믹스 , 비타블럭 ,초유아이지 \n관련 제품 홍보자료 비치\n\n3) 대원가축약품 / 이상훈원장\n가)신제품 홍보 및 판촉\n- 나노비타믹스 ,장프로 \n관련 제품 홍보자료 비치\n나)비타민 프리믹스 관련 논의\n3가지 제품 중에 1-2개 정리 예정\n이후 견적 요청하기로 함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["대덕농산","안강연합낙우회","대원가축약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750894411806119","msg_ts":"1750894411.806119"},{"date":"2025-06-26","raw_text":"작성일자*\n2025-06-26\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1) 대한가축약품 / 김성진 부장\n가)신제품 소개 및 판매 요청\n한우70% 낙농20% 양돈 10% 비율 판매\n - 나노비타믹스 , 장프로 , 닥터엔 관련 자료 전달\n나)취급 품목 소개 \n코코넛 , 파인애플 분말 농가 판매 요청\n비타민 프리믹스 관련 소개 \n - 에스에프 네츄럴 파워 사용즁\n 논의후 견적 요청예정\n\n2) 고려산업 / 전민규 차장\n원료 시황 및 스팟 공급건 문의\n- 분말 메치오닌 및 액상 메치오닌 \n- 보호지방 견적건 관련 사항 \n스팟 원료 관련 문의\n미팅 및 저녁식사 진행\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["대한가축약품","고려산업"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1750982728607529","msg_ts":"1750982728.607529"},{"date":"2025-06-30","raw_text":"작성일자*\n2025-06-30\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1) 뉴월드아쿠아 / 정성진 부장\n경남 진주시 소재\n가)공급원료 관련 문의\n1차로 제품 테스트겸 적용예정\n기본베이스 천하제일사료에 비테인 ,비타민\n첫 시험적용 예정 (고수온 대비)\n7월 중순즈음 예상\n(돔종류 적용 및 해수온도 25도 이상시 적용\n현재 22도정도)\n나) 향후 진행 예상\n7월 적용후 만족시 뉴월드아쿠아 자체 어가 4곳 및 가두리양식장 협회소속 어가10곳 등에 공동구매 또는 판매 진행 \n영업사원이 기존 제품 판매시 비테인 비타민도 병행 판매 예상\n대표 출하시즌 바쁜관계로 유선통화 진행 및 출하작업후 미팅예정\n\n2)사천수산 동물병원 / 이장희 원장\n가) 취급 품목 관련 논의\n양어 비타민 여름철 소량 판매\n비타민 EC 23000원 판매 \n(유니아쿠아 , 삼양애니팜 )\n나) 비테인 , 비타민 소개 및 판매요청\n\n3) 부경양돈 / 김덕민 계장\n가) 비테인 적용 시점 문의 \n-현재 기존재고 남아있으며 7월 중순즈음 발주 예상\n*2. 특이사항 (신규발생 및 이슈발생)*\n뉴월드아쿠아 \n비타민 99% 30ea 출고요청\n-> 발주 착오로 인해 97% 30ea 출고 진행됨\n방문 확인 결과 97% 1ea 판매 완료\n남은 97% 29ea -> 99% 29ea로 익일 교환진행\n*3. 대표 특별보고 및 지시사항*","clients":["뉴월드아쿠아","사천수산 동물병원","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1751325945642799","msg_ts":"1751325945.642799"},{"date":"2025-07-01","raw_text":"작성일자*\n2025-07-01\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1)서라벌 목우회 / 정원진 회장\n가) 취급 품목 설명 및 홍보\n- 7월 회의 참석자 대상 (6농가 참석)\n- 나노비타믹스 , 닥터엔 등 신제품 소개진행\n- 파인애플 분말 및 사일리지 관련 문의\n 시황 전달 및 분말 사용유도\n\n2) 자굴산 영농조합 / 김종화 대표\n가) 취급품목 설명 및 홍보\n - 나노비타믹스 ,닥터엔 신제품 소개 \n - 나노비타믹스 홍보물 전달 및 비치 홍보요청\n - 지원사업 이외 연계해서 농가 전달 되는 품목 없어 개별 구매 해야해 팜플렛등은 계속 사무실에 비치해 두고 있음 \n\n3) 코리아에프앤에프 / 구본석 차장\n가) 주문 및 출고요청\n-MCP 소포장 1,000Kg 주문 및 출고 요청함\n-1250원/kg 공급\n-양어사료 사용예정 \n나)차주 본사에서 미팅 진행예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n신규\n코리아에프앤에프\n*3. 대표 특별보고 및 지시사항*","clients":["서라벌 목우회","자굴산 영농조합","코리아에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1751413364793259","msg_ts":"1751413364.793259"},{"date":"2025-07-02","raw_text":"작성일자*\n2025-07-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1)송정농장 / 박기철 대표\n가) 이지스타터 관련 논의\n-  실험 결과 제품 좋다는 의견\n-  자체 분석까지 진행함\n- 기준보다 조지방 , 조섬유가 많이 높은제품\n나) 초유아이지 관련 문의\n단바이오 제품 사용중 (100g 10,000원 공급중이나 대표한테는 8000원 공급중)\n초유아이지 소개 및 사용요청함\n초유분말 거의 사용하지 않고 주사 형태 면역글로블린 제품 사용 \n다) 이외 신제품 홍보\n\n2) 우정농장 / 김현우 대표\n가) 이지스타터 관련 논의\n- 실험 결과 제품 좋다는 의견 \n- 실험 진행시 설사 부분이 있었으나 급여량 늘린\n부분에서 발생했다고 함\n- 전체적으로 제품 만족\n나)초유아이지 소개 및 사용 요청함\n단바이오 제품 사용중\n추후 샘플 및 팜플렛.가지고 재방문 하기로함\n다) 이외 신제품 홍보\n*분석서 공유드립니다\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["송정농장","우정농장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1751498618291259","msg_ts":"1751498618.291259"},{"date":"2025-07-03","raw_text":"작성일자*\n2025-07-03\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1) 한성동물병원 / 이현정 원장\n가) 신제품 소개 및 홍보 \n초유아이지 , 닥터N , 비타블럭 등\n해당 제품 관련 자료 전달\n팜플렛 제공시 비치 하기로함\n나) 제품군 판매 비교\n초유아이지 - 단바이오 제품 , 한성초유분말 (직접제조) ,프로스타터 판매 0두 \n가)신제품 소개 및 홍보 \n-초유아이지 , 닥터엔 , 나노비타믹스, 비타블럭 ,파인애플소개 및\n샘플전달\n나)나노화 공법 관련 논의\n- 리포존 기술과 세포 흡수 관련 \n- 나노화 장점 설명\n다)초유아이지 농가 공급 현황전달\n-초유아이지 장점 전달 및 재구매율 높은점 어필\n-공주지역 1,400여개 농가에 공급중\n라)지부 및 사업 활성화 관련 문의\n-경상남도 18개 시군 지부 있으며 일부는 활성화 되어있고 \n일부는 미미함\n-이중 거제 ,통영,양산 3곳은 농가수 적어 참여도 미미\n 실질적으로 15개 시군지부 활동\n-지부별 지원사업은 다르며 사업 선정은 시군에서 정하거나 \n개인이 신청하는 방식으로 이루어지며 사업진행은 지역 관행에\n따라 다름\nex)진주같은 경우 개인이 신청을 하고 사업이 선정되면 본인이 \n결정할수 있는 기구가 됨\n-도지회장이 지회 부서 책임자에게 여름철 더위 관련 지원사업 \n만들수 있는지 확인 지시함\n마)추후 계획\n8월27일 경상남도 지부회의 방문 및 제품 소개 예정\n진주농업기술센터 / 오전 10시 회의 진행 \n\n2)세계로케미칼 / 최호근 과장\n저녁식사 진행\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회","세계로케미칼"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1753659525451799","msg_ts":"1753659525.451799"},{"date":"2025-07-25","raw_text":"작성일자*\n2025-07-25\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 김해축협 / 정한상 과장\n가) 원료 시황 논의\n-DCP , 코코넛분말, 라이신 논의\n-DCP의 경우 9월 계약 종료예정 - 좋은 단가 요청 \n-주기적으로 시황 공유 요청\n나)보호지방 적용문의\n-메가팻 , 하이팻 스펙 전달 \n\n2) 양산기장TMR / 김기윤 팀장\n가) 보호지방 관련 문의\n-98%짜리 2500원대 사용중\n-보호지방과 생균제는 거의 교체 가능성 없으나 단가변동폭이 클때는 \n 교체예정\n나) 기타 원료 적용가능여부 확인 요청\n제면박 , 함수포도당등\n\n3)부경양돈 / 김덕민 계장\n코코시스 4톤 주문 발송 요청함\n30일(수) 입고 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["김해축협","양산기장TMR","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1753659562786069","msg_ts":"1753659562.786069"},{"date":"2025-07-28","raw_text":"작성일자*\n2025-07-28\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)서라벌 목우회 / 정원진 회장\n가) 취급 품목 설명 및 홍보\n- 나노비타믹스 , 닥터엔 등 신제품 소개진행\n- 파인애플 농가 홍보 요청\n\n2)천년TMF영농조합 /조광제 상무\n가)취급원료 수급관련 문의\n -소맥피 , 비타민 프리믹스 , 중조 \n 한번 구매시 대량으로 구매해 수급문제는 거의 없는편\n-기호성 원료 적용 검토 요청\n\n3) 코리아에프앤에프 / 구본석 차장\n대두박  25,000kg 주문 및 발송요청함\n레시틴 단가 비교 요청 \n\n4) 삼솔농장 / 한기웅 도지회장\n초유아이지 팜플렛 전달\n초유아이지 80ea 주문 및 발송 요청함\n\n5) 시현축산 / 하광봉 제표\n비테인 , 황산염라이신 , 장프로 거래명세서 전달\n황산염라이신 성분등록증 및 성적서 전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n신규\n코리아에프앤에프 -대두박 \n삼솔농장 -초유아이지\n*3. 대표 특별보고 및 지시사항*","clients":["서라벌 목우회","천년TMF영농조합","코리아에프앤에프","삼솔농장","시현축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1753746313847109","msg_ts":"1753746313.847109"},{"date":"2025-07-29","raw_text":"작성일자*\n2025-07-29\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 한성동물병원 / 이현정 원장\n가) 신제품 소개 및 판매요청\n- 초유아이지 , 딕타N , 파인애플 분말 \n-나)초유아이지 한성초유분말 직접 조제 판매\n  50g 8천원 판매\n (포장단위 100g 이상 가능한지 확인요청)\n-다)닥터엔 소개 및 비슷한 라인업 유무 확인\n- 겹치는 제품 없어 검토후 연락 예정\n\n2) 한국동물병원 / 성유제 원장\n가)초유아이지 제품 발주  관련 문의 \n\n3)삼솔농장 / 한기웅 도지회장\n가) 초유아이지 배송관련 논의\n- 제조 되는대로 신선 제품으로 발송\n나) 8월 회의 일정 및 제품 소개 시간 관련 문의\n\n4)백제약품 / 이성진 이사\n가).초유아이지 주문 및 배송일자 논의\n-주문후 즉시 생산 시스템 (고객 전달까지 20~30일 소요 예상하고 발주)\n-MOQ 물량 계약후 대박스 단위는 백제약품에서 고객에 직접 발송 해주기로 함\n나) 1차 MOQ 640봉 주문 및 생산 요청\n-2박스(160봉) 사무실 발송요청\n-1박스(80봉) 삼솔농장 발송 요청\n다) 포장 및 스티커 관련 문의\n- 50g은박포장 앞면 스티커 세인제작 스티커 부착 가능 뒷면 인쇄부분 은박포장 생산시 세인 비에스 내용 인쇄한것으로 사용\n-소박스 , 대박스 스티커 부착 가능\n- 박스 스티커 세인에서 디자인 및 스티커 제작후 전달 예정\n- 사이즈 확인위해 박스.사무실로 택배발송 요청\n- 이후 스티커 디자인 의뢰 예정\n\n5) 한펠 / 정소영 이사\n가) 코코시스 물량 관련 논의\n부경양돈 물량 늘어난 이유 전달 \n나) 주문량 조절 관련 사항\n공급시 물량 늘려 발주 가능여부 문의\n-창고 공간 협소로 인해 불가사항 전달\n다) 코코시스 단가 인상안 \n- 원료가격 상승으로 인해 한펠 9월부터 큰 물량 거래처부터 인상계획 \n- 세인과의 논의는 아직 계획되지 않았으나 추후 상황에 따라 논의 필요 \n\n6) 부경양돈 / 김덕민 계장\n가) 코코시스 입고 관련 사항 전달\n- 익일 도착 및 입고 시간 전달\n\n7) 대구축협 / 이승호 과장\n염화콜린 입고 상황 확인\n염화콜린 7,000kg 주문 및 발송요청함\n8월5일(화) 입고 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["한성동물병원","한국동물병원","삼솔농장","백제약품","한펠","부경양돈","대구축협"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1753919620839289","msg_ts":"1753919620.839289"},{"date":"2025-07-30","raw_text":"작성일자*\n2025-07-30\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)충무수산동물병원 / 정삼석 대표\n가)비타민 시황 전달 \n-비타민 대량구매 및.비치 어려움\n-소량 한 두포 발주 농가 연결시 발송 가능여부 문의\n나) 비테인, 타우린 소개 및 판매 요청\n- 관련 서류 전달 요청\n- 비테인 99% 단가 전달\n\n2) 장유수산 / 이무열 대표\n가)비타민 시황 및 단가전달\n- 배합 변경으로 비타민 재고 남아있어 확인후 발주예정\n-VC35% 적용 관련 문의\n-현재 공동 대표와 논의중으로 결과 나오면 알려주기로 함\n나)어분 판매 요청\n-인도네시아산 판매공조 요청\n\n3) 부산사료 / 김지은 과장\n하이팻 2,000kg 주문 및 발송요청함\n8월5일(화) 입고 요청\n\n4) 부경양돈 / 김덕민 계장\n코코시스 4,000kg 주문 및 발송 요청함\n8월5일(화) 입고 요청\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["충무수산동물병원","장유수산","부산사료","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1753919663858009","msg_ts":"1753919663.858009"},{"date":"2025-07-31","raw_text":"작성일자*\n2025-07-31\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)의령축협 / 김정원 과장\n가)취급 원료 수급 현황 문의\n- 제면박 및 과자박 적용 가능여부 문의\n- 현재 370원대 공급중 \n나) 기타 원료 접목가능여부 확인요청\n-보호지방 , 포도당 등\n\n2)부산사료 / 김지은 과장\n가)보호지방 시황 전달 \n-보호지방 단가 상승 관련 내용 공유\n-변동사항 주기적 전달 요청\n나)기타 원료 접목가능여부 확인요청\n-포도당 ,비타민 C \n\n3)백제약품 / 이상진이사\n가) 제품관련 문의 및 택배발송 상황 확인\n- igG 30%관련 사항 \n-택배 금일 사무실 도착확인\n\n4) 통일동물병원 / 백원원 원장\n가) 초유아이지 패키지 수정 사항 체크 및 타사제품 비교 분석\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["의령축협","부산사료","백제약품","통일동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1754007260825339","msg_ts":"1754007260.825339"},{"date":"2025-08-06","raw_text":"작성일자*\n2025-08-06\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 통일동물병원 패키지 작업\n가) 제품 팜플렛 수정 및 컨펌\n-여름철 패키지 자료 수정 \n백원원 원장 수정요청사항 수정 및 익일 재 문의예정\n나) 제품 발송 건 관련 논의\n-현재 동물병원 내 제품으로 우선 진행\n다) X-배너 설치 문구 및 포인트 논의\n-작업시안 완료 및  배너 주문 진행 예정\n라) 패키지 이익 및 세부사항 사장님 보고용 자료 작성\n마) 팜플렛 최종 컨펌시 인쇄 및 병원 비치 하기로함\n\n2) 초유아이지 관련 작업\n가) 초유아이지 목표 판매수량 수정\n-영업사원 전달 완료 \n나) 초유아이지 제품 작업\n-스티커 하단부 판매원 세인 변경 가능여부 문의\n(금요일 까지 가능여부 및 비용 관련 사항 전달 주기로 함 - 백제약품 이상진 이사\n-초유아이지 제품 팜플렛 수정 및 2안 제작\n익일 이충선 이사 전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":[],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1754522911243069","msg_ts":"1754522911.243069"},{"date":"2025-08-07","raw_text":"작성일자*\n2025-08-07\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.일반사항\n1)부산사료 / 김지은 과장\n가)보호지방 시황 전달\n나) 신규원료 투입 관련 문의\n-사료비 인상 등의 요인으로 단가 낮은 원료 위주로 찾지만 거의 맞춰진 상황\n-포도당  접목가능여부 문의\n\n2)경남가축약품 / 최성호 대표\n가)신제품 홍보 및 판매 요청\n-의약품 위주 진열 공간 배치후 신제품 비치요청\n-초유아이지 ,나노비타믹스 , 닥터엔 소개\n\n3)통일동물병원 / 백원원 원장\n가)여름철 패키지 수정안 및 배너관련 논의\n나)협회회의 참석 관련 내용 논의\n- 사장님 전달 사항 공유 \n\n4)부경양돈 / 김덕민 계장\n가) 비테인 추가 물량 8\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 한성동물병원 / 이현정 원장\n가) 신제품 홍보 및 판매 요청\n- 신제품 라인업중 이지스타터 관심 표명\n 농가 실험 내용 및 결과 전달 \n나) 나노비타믹스 판가 관련 논의\n- 공급가 인상으로 판매가 인상 가능여부 문의\n\n2) 주홀산밑에 농장 / 박성근 대표\n경북 문경소재\n사육두수 38두\n송아지 경매시장 올해 5번 가장좋은 성적\n가) 신제품 소개 \n-팜플렛 전달 및 나노비타믹스 위주 미팅\n-비타민 E 함유에 관해 나노비타믹스 긍정적\n-현재 재고가 많아 소진후 사용계획\n나)수정란 관련 사항 논의\n- 박람회때 소개된 수정란 많이 나온농가 관련 내용 기억하고 있음\n다)수정란 채취 성공율 평균\n평균60%대\n작년 20% 성공 올해 70% 성공\n동결란 처음 사용으로 보관 문제 , 이른 감정 , 잘 들어가게 하려고 건초만 급여 등 인위적으로 스트레스가 있었다 판단 , 올해는 원래대로 하고 영양제 정도 급여로 반등 \n\n라) 수정란 다룰때 가장 문제점\n- 보통 이식후 38일후 착상진행되는데 발정안되고 감정때까지 발정 안내는 소들 있어 가장 주의깊게봄\n감정시 피감정은 정확성이 떨어져 직접 손으로 넣고 파악\n40일정도에 진행하니 작년 결과가 떨어져 올해는 60일 정도에 진행예정\n\n마) 난 공급처 및 비용\n난 공급처 : ET바이오 경상대, 축산기술연구소등\n난 가격 : 25만원~100만원이상 \n젖소쪽은 1000만원 이상도 있음\n\n바) 공여우 선정기준\n-  초우량암소에서 시작해 초우량암소의 새끼까지 후보군에 둠\n새끼는 우량암소는 아니지만 가능성이 높기에 후보군으로 묶음 \n소빌리기가 어려움\n3개월 빌려 6개월 값 지불 (600만원)\n정액가격은 따로 지불해야함\n공란우 임대료는 문경시에서 지원\n\n사) 수정란이식사업현황\n- 문경시 수정란 이식 연간 160두 규모\n-현재 수정사6명 (추가2~3명 교육중)\n자격있는 사람에 한해 가능\n\n아) 수정란사업 교육 및 행사관련 문의\n26일(금) 수정사 보수교육 있어 와서 제품 소개도 하고 하면 좋겠다는 의견\n회장 연락처 수령\n\n3) 경상북도수정사협회 / 정형식 회장\n-26일 수정사보수교육 참석 및 제품 소개 가능여부 타진\n( 교육시간이 타이트해 힘들다는 의견)\n-연말 협회 회원을 상대로 하는 교육 있어 그때 참석해달라는 의견\n(40명~100명 참석) \n필드 활동하는 회원들임\n구체적 일정은 박성근 대표와 조율 요청\n\n4)부경양돈 / 김덕민 계장\n가) 코코시스 가격인상안 관련 논의\n한펠 2200원 견적\n다볼 - 양주축협 2100원 공급\n김해축협 1950원 공급\n다볼 부경양돈에 견적 미전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*\n\n---\n\n<@U08PUV8B431|박제영> :+1: :+1:","clients":["한성동물병원","주홀산밑에 농장","경상북도수정사협회","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1758240555106649","msg_ts":"1758240555.106649"},{"date":"2025-09-22","raw_text":"작성일자*\n2025-09-22\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 거창 신경범 대표\n한우 100두 사육(번식)\n가) 신제품 소개 및 사용 권유함\n-설사72 , 나노비타믹스 관심\n올해 더워 지원사업으로 비타민제 많이 받아 \n재고 소진후 사용결정 \n\n2) 거창 구교환대표\n한우 140두 사육 (번식)\n가) 신제품 소개 및 사용권유함\n-설사72 20ea 주문 및 출고요청함\n나) 수정란 관련 문의\n-3년전 해봤으나 여름 더위로 인해 실패 \n\n3)칼스 / 이재호 본부장\n글리세린 견적 관련 문의\n익일 수령가능 예상 \n글리세린 시황 정보 확인\n*2. 특이사항 1) 합천축협 본점/ 김용욱 조합장\n백원원 원장 동행\n가)회사 소개 및 신제품 소개\n- 나노비타믹스 장점 및 농가 적용 결과 전달\n나) 수정란 사업 적용시 장점 설명\n-합천지역 수정란 사업 농가 \n(24년 182명 /25년 245명)\n- 수정란 결과사진을 통해 장점 전달 및 적용권유\n- 축협 동물병원 비타민 AD3 제품 비간톨 사용\n다)조합장 먼저 써보고 홍보 및 입고 가능성 有\n-나노비타믹스 5kg 샘플 전달\n-제품 관련하여 긍정적인 반응이라 기대해볼만함\n\n\n2)전국한우협회 합천군지부 / 김종배 지부장\n백원원 원장 동행\n가)한우 시장 현황 논의\n-7월부터 소 가격 상승세 \n(미경산우 지육 130~140kg 29,000원\n경산우 21,500원/kg)\n- 지역별 도축 현황\n음성 지역은 근내지방 문제 심각하여 암소출하 多\n합천 지역은 6월 기준 780두 정도 해드림 으로 출하\n긴급 도축의 경우 해드림 이용하는 경우 많음\n \n나)회사 소개 및 신제품 소개\n-나노비타믹스 장점 및 농가 적용 결과 전달\n- 비간톨 vs 나노비타믹스 비교\n\n다)수정란 사업 적용시 장점 설명\n-수정란 결과사진을 통해 장점 전달 및 적용권유\n현재 일반 번식농가의 번식 성적 많이 떨어짐 /수태율 낮아짐\n지부장의 경우 과거 수태율 88% 정도 했으나 현재는 68%대 하락\n\n라)현재 수정란 이식 전략(지부장 예)\n과거에는 시장에서 최고 좋은 송아지 매입 유전자 개량\n->합천지역은 경매를 통해 좋은 난자를 확보하는 경향이 있음\n최근에는 번식 전략 변화를 통해 가격이 저렴한 암소를 매입하여 수정란이식을 통해 계량 \n\n마)보조사업 추진 가능 사항 전달 (조달청 등록 사항 전달)\n\n바)합천군지회 회원 현황\n현재 회원수 180명 (1300농가 / 4만여두 사육)\n과거 400명 정도 였으나 현재 협회 거치지 않고 사업을 할수 있게\n되어 줄어들고 회비 납부 및 활동참여에 부담으로 인해 이탈\n\n※14일 (화) 지회 임원 및 운영위원 회의 예정\n->제품 설명회 가능 여부 확인요청\nFiles: 20251002_081712.jpg (ID: F09JD4ZHCVA, image/jpeg, 230.3 KB), 20251001_110734.jpg (ID: F09JNDZTDR7, image/jpeg, 974.6 KB), 20251001_110824.jpg (ID: F09J633RSAZ, image/jpeg, 781.0 KB), 20251001_114828.jpg (ID: F09J9J397AN, image/jpeg, 669.6 KB), 20251002_081737.jpg (ID: F09J35NQ60K, image/jpeg, 139.3 KB)","clients":["합천축협 본점","전국한우협회 합천군지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1759363102370789","msg_ts":"1759363102.370789"},{"date":"2025-10-12","raw_text":"10월12일 업무보고\n1.기본사항\n1) 한성동물병원/ 이현정 원장\n가)신제품 홍보 및 판매요청\n- 이지스타터 타겟군 판매 가능여부 문의\n- 초유아이지 , 설사72등 신제품 관련 논의\n나)한우협회 관련 논의\n- 경남지역 활동 및 진행상황 관련 영주 지역 논의\n- 영주 한우협회 관계자 내원시 논의후 피드백 주기로 함\n\n2)대일알앤에프 / 박지후 부장\n가) 회사 소개 및 취급 원료 소개\n-취급 원료 관련 논의\n나)현재 어분 생산 시운전 및 샘플 생산\n- 제품 판매단계전\n- 샘플 생산 하고 있으나 원하는 수치가 나오지 않아 수정중에 있음\n- 어분 및 페이스트만 진행중  SLP사료는 진행하고 있지 않음\n- 재고 소진시 BHT 발주 진행예정\nFiles: 20251112_201528.jpg (ID: F09SGF7KW2Z, image/jpeg, 58.1 KB)","clients":["한성동물병원","대일알앤에프"],"per  문의\n- 면역증강제와 약품 공급 받는중 \n- 지원금 지원 3 농가 7 비율로 공급중이라 비싼 제품은 적용하기 \n  어려움\n- 내년 지원사업 올해 8월 수요조사 완료\n나) 지부회의 관련 문의\n- 추수작업으로 인해 당분간 없을것으로 예상\n- 연말 연석회의 가능성있어 회의전 지부 회의 가능성 있음\n다) 제품 소개 \n- 신제품 팜플렛 비치 및 실장에게 제품 소개진행\n- 비치후 농가 홍보 해주겠다함\n\n3) 코리아에프앤에프 / 구본석 차장\n -원료 취급 문의\n- 옥글루텐 관련 내용 전달 요청\n\n4) 장유수산/ 이무열 대표\n-새로운 원료 적용 관련 문의\n- 주정박/ BHT 검정서 및 단가 전달\n\n5) 오앤티 / 공제우 부장\n- 11월 메치오닌 시황 전달 및 공급건 관련 논의\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["마산가축약품","전국한우협회 창원시 지부","코리아에프앤에프","장유수산","오앤티"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761177390288349","msg_ts":"1761177390.288349"},{"date":"2025-10-23","raw_text":"작성일자*\n2025-10-23\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)동성동물약품/실장\n가)신제품 홍보 관련 논의\n-낙농 한우 양돈 모든 약품 취급중이나 양돈비율 가장큼\n-나노비타믹스 / 장프로 소개 및 판매 권유\n나) 대표일정관련 논의\n- 대부분 외근 일정으로 인해 팜플렛 전달 및 추후 미팅 예정\n\n2)전국한우협회 함안군지부/ 실장\n함안 한우 농가 약 400여개 /회원농가 200여개\n가)협회 지원사업 관련 문의\n- 설사예방약, 면역증강제, 구충제는 100% 무상지원 품목\n  첨가제의 경우 50% 농가 부담으로 진행\n( 해당품목의 숫자가 적기 때문에 자부담을 받아 조금 더 구매하여 농가에 \n  더 제공하기 위함)\n나) 내년 지원사업 관련 문의\n- 내년 1월 수요조사 진행예정\n- 지부장 또는 사무국장과 논의되면 내년도 지원사업 등록 가능할것으로 예상\n다) 지부회의 관련 문의\n- 추수작업으로 인해 11월 이후 관계자 미팅 가능하며 현재는 따로 회의일정없음\n라) 수정란 사업 관련 문의\n- 축협에서 관리하고 있어 축협쪽으로 문의 요청\n\n3)함안축협 동물병원/ 이경호 과장\n가)회사소개 및 신제품 홍보\n- 신제품 소개 및 팜플렛 전달\n- 대부분 약품 위주 판매하며 약품업체 3군데 정도에서 공급받아 사용중이며 \n 개별적으로 주문하지는 않음\n나) 원장미팅 관련 논의\n- 유동적이라 원장 통화후 미팅진행 추천\n- 원장 연락처 수령(이우녕 원장)\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["동성동물약품","전국한우협회 함안군지부","함안축협 동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761264547841939","msg_ts":"1761264547.841939"},{"date":"2025-10-27","raw_text":"작성일자*\n2025-10-27\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1. 기본사항\n1) 그레니에 / 김준연 과장\n가)적용 가능 품목 논의\n- 주정박, 보호지방 , 포도당등 적용가능품목 전달\n나) 비타민 관련 논의\n- 단일 비타민 사용 관련 문의\n- 비타민 프리믹스 완제 사용 \n\n2)한성동물병원 / 이현정 원장\n가)신제품 소개 및 판매 권유\n- 초유아이지, 설사72, 닥터엔 등\n- 이지스타터 비교 가능 제품 타겟 없어 직접 조제 판매중\n(직접 조제 판매면 소비자 인식이 비싸다고 생각함)\n- 제품 공급가 및 최소수량 전달 요청\n-나노비타믹스E 40kg 주문 및 발송 요청함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["그레니에","한성동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761608651919979","msg_ts":"1761608651.919979"},{"date":"2025-10-28","raw_text":"작성일자*\n2025-10-28\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)전국한우협회 사천시지부 / 실장\n협회 회원 191명 / 농가수 50여개\n가)협회 지원사업 관련 문의\n- 첨가제 및 생균제 지원사업 지원중\n나) 내년 지원사업 관련 문의\n- 내년 3월 수요조사 진행예정\n- 견적서 요청시 전달해달라고 함\n다) 지부회의 관련 문의\n- 현재는 따로 회의일정없음 (추수작업으로 인함)\n라) 수정란 사업 관련 문의\n- 수정란 사업하는 회원 있으나 축협쪽 문의하는편이 낫다는 의견\n\n2)사천축협 동물병원 / 김건우 과장\n가) 회사 소개 및 제품 소개\n- 신제품 소개 및 팜플렛 전달\n나) 원장(나준근 원장) 미팅 가능여부 문의\n- 원장 현장으로 대부분 출근 / 개인정보로 인한 연락처 전달 어려움\n\n3)전국한우협회 고성군지부/ 최길남 사무국장\n협회 가입농가 280 농가\n가)협회 지원사업 관련 문의\n-설사 예방약 , 구충제 등 약품으로 진행\n나) 내년 지원사업 관련 문의\n- 내년 1월쯤 예정\n- 지역 동물병원 연계로 진행되기도 함 \n- 견적서 요청시 전달해달라고 함\n다) 수정란 사업 관련 문의\n- 작년 축협 및 센터에서 사업있어 했으나 올해는 사업 없음\n- 개인이 따로 하고 있을 가능성은 있으나 자세한 내용은 모름\n라) 단일 원료 관련 문의\n- 코코넛 제품 및 제면박 관련 문의사항 전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회 사천시지부","사천축협 동물병원","전국한우협회 고성군지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761695912237469","msg_ts":"1761695912.237469"},{"date":"2025-10-29","raw_text":"10/29일 업무보고\n1.기본사항\n1) 대성농장/한정관 이사\n이복진 차장 동행\n가) 회사 소개 및 비타쎄 제품 소개\n-나노비타민 vs 비고솔 비교설명\n-나노비타민 샘플 테스트 진행 \n(침전물 확인 요청)\n나) 실험 관련 사항 논의\n- 제품 최대한 빨리 전달후 실험 진행 \n- 5만수 2개동 실험 진행\n(같은 환경 , 같은 주령 등 동일한 상태)\n1일 음수량 11톤 \n3일급여 4일 휴식 사이클 2회 반복적용\n약70L 적용 계획\n-6만5천수 실험진행\n환우 이후 비타민 적용 \n1일 음수량 14톤\n3일급여 4일 휴식 사이클 2회 반복적용\n약 90L 적용계획\n다) 실험결과 관련 논의\n- 대외비 조건하에 원하는 실험 결과자료 모두 제공 하기로 함\n-추후실험 결과에 따라 구매 가능성 거론\n\n2) 의령축협 / 손백현 조합장\n설사72 3box (30ea) 주문 및 출고 요청함\n\n3) 시현축산 / 하광봉 대표\n황산염라이신 1,000kg \n비테인 200kg  주문 및 발송 요청함\n\n2. 특이사항: 없음 \n3. 대표이사 보고 및 지시사항: 없음\nFiles: 20251029_135539.jpg (ID: F09P3SK9HST, image/jpeg, 1.6 MB), 20251029_141409.mp4 (ID: F09PKB14F8S, video/mp4, 12.4 MB)","clients":["대성농장","의령축협","시현축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761780849988949","msg_ts":"1761780849.988949"},{"date":"2025-10-30","raw_text":"작성일자*\n2025-10-30\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1. 기본사항\n1) 대한가축약품 / 김성진 부장\n가)신제품 소개 및 판매 요청\n - 나노비타믹스 , 장프로 , 닥터엔 관련 자료 전달\n- 한우쪽 비중이 높아 신제품 적용검토 요청\n나)취급 품목 소개 \n-코코넛 , 파인애플 분말 농가 판매권유 \n\n2) 고려산업 / 전민규 차장\n가) 아미노산 시황 관련 논의\n- 액상메치오닌 사용 관련 문의\n- 월15톤 정도 사용\n나) 스팟 원료 관련 문의\n-현재 적용 고려중인 품목 없음 \n\n3) 코리아에프앤에프 /구본석 차장\n대두박 25,000kg 주문 및 출고 요청함\n11월1일(토) 입고 예정\n\n4)부경양돈 / 김덕민 계장\n-발린 예가 산정 위한 견적서 전달\n-월3-4톤 사용\n (2800원/kg)\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["대한가축약품","고려산업","코리아에프앤에프","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1761867139713499","msg_ts":"1761867139.713499"},{"date":"2025-10-31","raw_text":"작성일자*\n2025-10-31\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)KB 동물병원/ 임권빈 원장\n가)신제품 소개 및 판매요청\n- 나노비타쎄 , 장프로 소개 및 농가 적용 요청\n- 양계 난각개선제 ,비타민 ,생균제 많이 사용중\n- 농가 실험 결과 및 제품 홍보물 전달 요청\n- 11월 2째~3째주 사이 재미팅 하기로 함\n\n2)부경양돈/ 김덕민 계장\n이재석 부사장 동행\n가) 코코시스 단가 인상안 관련 논의\n-11월 재논의 진행 예정\n나) 입찰 공고 \n- 12월 아미노산 입찰 진행 예정\n\n3)시현축산/ 하광봉 대표\n가) 비타민 제재 소개 요청\n- 나노비타믹스 제품 소개 및 홍보물 전달\n\n4) 오앤티 / 공제우 부장\n가)메치오닌 4분기 시황 관련 사항 전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["KB 동물병원","부경양돈","시현축산","오앤티"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1762128059636139","msg_ts":"1762128059.636139"},{"date":"2025-11-05","raw_text":"작성일자*\n2025-11-05\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)) 산청조섬유TMF / 조춘래 소장\n가) 사용 원료 관련 논의\n단가가 낮고 미생물 배양에 초점\n배지종류 사용 \n나)비타민C관련 논의\n비타민 C 35% 가격 전달\n기본 베이스에 따로 소량 첨가중\n다) 신제품 소개 및 농장 적용 검토 요청\n\n2) 노엘목장 / 신창호 대표\n가) 파인애플분말 관련 논의\n- 1차 샘플 적용후 비교 분석 요청\n- 추가 샘플 생산시 전달 예정\n나) 신제품 소개 및 적용 요청\n-닥터엔 , 나노비타블럭  제품 소개\n\n2. 특이사항 (신규발생 및 이슈발생)\n3. 대표 특별보고 및 지시사항\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":[") 산청조섬유TMF","노엘목장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1762384653863949","msg_ts":"1762384653.863949"},{"date":"2025-11-06","raw_text":"작성일자*\n2025-11-06\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)전국한우협회 하동군지부 / 김용일 사무국장\n비육 80두 사육 / 현재 퇴비사업 병행중\n협회 회원 220명/ 옥종면 회원 25명 \n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 첨가제 및 생균제 등 지원사업 지원중\n나) 내년 지원사업 관련 문의\n- 7~8월 사업취합 ->10~11월 예산안 제출\n- 내년 지원사업 취합 종료 \n-> 보조사업 비타민제는 업체만 바꾸면 되서 진행 가능하나 기존 예산 내에서\n    조정 필요\n- 지원사업 선정시 발전기금10% 정도 협회 운영차원에서 지원필요\n다) 지부회의 관련 문의\n- 군단위 행사 연1회 (1~2월 결산총회)진행\n라) 수정란 사업 관련 문의\n- 수정란 사업은 하고 있지 않음\n마) 협회에서 매년 9~10월 군에서 지원 받아 년1회 교육 실시\n(사양관리 및 제품교육등)\n-금년 없었으나 내년에는 가능하면 교육요청\n\n2)전국한우협회 창녕군 지부 / 실장\n협회 회원 230명\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 첨가제 ,면역증강제 ,방역 관련 약품 등 \n나) 내년 지원사업 관련 문의\n-협회가 축산과 요청을 받아 추천형식으로 제품리스트 올림\n- 지원사업 3월경 공고되는 경우 많음\n(어떤 사업 카테고리에 들어가느냐에 따라 적용 가능성 달라짐)\n- 보조사업은 공고/집행 종료\n다) 지부회의 관련 문의\n- 올해 예정중인 회의 없음\n라) 수정란 사업 관련 문의\n- 수정란 사업은 하고 있지 않음\n\n3)부경양돈 / 김덕민 계장\n가) 코코시스 4,000kg 주문 및 발송요청함\n11일(화) 입고예정\n\n4)코리아에프앤에프 / 구본석 차장\n가)대두박 25,000kg 주문 및 발송요청함\n7일(금) 또는 10일(월) 입고 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회 하동군지부","전국한우협회 창녕군 지부","부경양돈","코리아에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1762472818452839","msg_ts":"1762472818.452839"},{"date":"2025-11-10","raw_text":"작성일자*\n2025-11-10\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)통일동물병원 / 백원원 원장\n가) 울산 울주군 소재 농가 \n- 한우 10두 채혈 진행 서포트\n나)경상남도 한우협회 및 동물병원 영업 관련 논의\na) 진행사항 공유 및 추후 활동 논의\nb)합천축협, 의령축협 조합장 금일 통화연결 실패\n  -콜백시 관련 내용 공유하기로함\n  - 사용중인 제품 관련하여 재미팅 진행예정\nc)사천축협 조합장 유선 문의\n-한우 암소개량센터 수정란 이식 관련 문의\n- 수정란 생산용 암소 없으며 외부 냉동 수정란 구매 방식\nd)거창축협 동물병원 백종훈 원장 퇴사 \n-오지홍 원장 유선 통화진행\n-제품 홍보물 및 농가 실험 결과지 우편으로 전달요청\n- 자체 논의후 홍보용 제품 비치 예정 \ne) 거창축협 전달후 밀양축협 재미팅 논의 하기로함\n\n2)거창 구교환 대표\n설사 72 3box 주문 및 발송 요청함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["통일동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1762817925631429","msg_ts":"1762817925.631429"},{"date":"2025-11-11","raw_text":"작성일자*\n2025-11-11\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 영광가축약품 / 이은종 대표\n가) 신제품 소개 및 판매 요청함\n- 장프로 ,나노비타믹스 등 소개\n나) 대표 운영 농장 실험 제안 요청\n- 내부 논의후 결론 전달 예정\n(자세한 두수는 밝히지 않음]\n-비흥농장 사례 전달 \n\n2) 부경양돈 \n가) 입찰참여\n-발린98% 월2.5톤 1년 공급\n-참여업체\n(세인 , ENT , 희우 , CJ)\n-입찰 결과\nENT 2278 낙찰 \n희우 2300 \n세인 2400 \nCJ 차이 많이남\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["영광가축약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1762903207536469","msg_ts":"1762903207.536469"},{"date":"2025-11-13","raw_text":"작성일자*\n2025-11-13\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)전국한우협회 거창군 지부 / 박세호 사무국장\n협회 회원 402개 농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 첨가제 ,면역증강제 ,방역 관련 약품 등 \n나) 내년 지원사업 관련 문의\n- 한우협회 직접구매가 아닌 거창기술농업센터 방역담당을 통해 선정\n- 내년 지원사업 확정전으로 예상\n다) 지부회의 관련 문의\n- 올해 예정중인 회의 없음\n라) 수정란 사업 관련 문의\n- 수정란 사업은 축협 주관으로 하고 있으나 올해는 거의 종료함\n\n2)거창축협 동물병원/ 오지홍 원장\n가)신제품 소개 및 병원 비치 관련 논의\n- 홍보물 전달 및 제품 설명\n- 나노비타믹스 병원 비치는 홍보가 되지 않은 제품이라 효과 없을것으로 판단\n-> 번식율 안좋은 농가 3~4군데 체크한곳이 있어 거기 급여해보자는 의견\n- 나노 비타믹스 20kg 샘플 금일 발송요청함\n\n3)전국한우협회 함양군 지부 / 실장\n협회 회원 190개농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 설사치료제 , 방역 관련 약품 ,첨가제 등\n나) 내년 지원사업 관련 문의\n- 가축위생계 예산으로 진행 \n- 대부분 가축위생계에서 정해 내려주는 방식으로 진행\n다) 지부회의 관련 문의\n- 11월말 교육일정이 있으나 내년초 연시총회때 소개추천\n라) 수정란 사업 관련 문의\n- 수정란 사업은 축협 보조사업으로 진행 / 축협을 통한 접근이 효율적\n- 사업은 10여년째 진행중이나 자세한 사항은 축협 문의\n\n4)통일동물병원 / 백원원 원장\n- 설사72 3BOX , 나노비타믹스1BOX  출고 요청함\n\n5)내평농장/ 민병관 대표\n- 코코시스 1,000kg 주문 및 출고 요청함\n(2,500원/kg)\n*2. 특이사항 (신규발생 및 이슈발생)*\n내평농장 코코시스 1,000kg 신규주문\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회 거창군 지부","거창축협 동물병원","전국한우협회 함양군 지부","통일동물병원","내평농장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1763079090593069","msg_ts":"1763079090.593069"},{"date":"2025-11-17","raw_text":"작성일자*\n2025-11-17\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)오케이/ 류하나 부장\n가)인산칼슘 시황 전달 및 단가인상 관련 논의\n-12월 적용 (1160원) 관련 견적서 전달\n나)비타쎄 적용 관련 문의\n- 농가 적용 결과 요청 및 논의후 재미팅 진행 예정\n\n2)양산기장TMR/ 김기윤 팀장\n가)보호지방 단가 및 시황 논의\n- 팔미트산 2500원 사용중 (변동사항 없음)\n- 주기적인 시황 전달 요청 \n\n3)한탑 / 김종목 이사\n가)인산칼슘 시황 전달 및 생산일정 관련 논의\n- 주문량 저조로 인해 기존 400kg 사용후 발주 일정 논의예정\n\n3)백제약품/ 이상진 이사\n가)초유아이지 발주 관련 논의\n- 1280봉 추가 주문 및 생산요청\n\n4)노엘목장 / 신창호 대표\n가)파인애플 분말 샘플 공급 관련 논의\n- 금주 또는 차주 초 샘플 전달 예정\n\n5)코리아에프앤에프/구본석 차장\n-대두박 25,000kg 주문 및 출고 요청함\n18일(화) 입고 예정\n\n6)거제 배홍권 대표 \n-나노비타믹스 1box 주문 및 출고요청함\n(10,000원/kg)\n(익일 미팅예정)\n\n7)시현축산 / 하광봉 대표\n-기림축산 하성봉 대표(동생)\nVM 프리믹스 1,000kg 출고 요청\n(3000원/kg)\n*2. 특이사항 (신규발생 및 이슈발생)*\n배홍권 대표 (전국한우협회 거제시지부 사무국장)\n나노비타믹스 1box\n*3. 대표 특별보고 및 지시사항*","clients":["오케이","양산기장TMR","한탑","백제약품","노엘목장","코리아에프앤에프","시현축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1763421663828829","msg_ts":"1763421663.828829"},{"date":"2025-11-18","raw_text":"작성일자*\n2025-11-18\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)합천돼지자가 / 유정례 실장\n가)인산칼슘 시황 전달 및 단가 인상안 논의\n- 12월 940원 적용 단가 인상안 전달\n- 재고 파악후 발주 예정\n\n2)영광축산/박현규 대표\n경남 합천 소재 농가\n3500두 사육중\n가) 회사 소개 및 취급 원료 전달\n- 코코시스 소개 및 단가 전달\n나) 기타 취급 원료 소개\n- 발효대두박,MCP,비타민E 등 견적 전달 요청\n- 대부분 단일 원료 사용중이며 첨가제는 거의 사용하지 않음\n- 나노비타믹스E 샘플 공급후 분만사 적용예정\n\n3)우일축산약품 / 강대규 과장\n가)장안농장 관련문의\n- 7,000두 사육중\n나)나노비타믹스 건 관련 문의\n- 발주량 증가 이유는 따로없음\n- 주사 스트레스로 인한 자돈구간 급여\n다)방문 관련 논의\n- 담당자도 거의 못만나며 외부에서도 거의 만나려 하지 않음\n- 추후 방문시 동의하에 동행방문 하기로함\n라) 발주담당자 교체 요청\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["합천돼지자가","영광축산","우일축산약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1763509014908529","msg_ts":"1763509014.908529"},{"date":"2025-11-19","raw_text":"작성일자*\n2025-11-19\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)뉴월드 아쿠아 /김정순 대표\n가) 비타민 시황 공유 \n- VC 97% , VE50% 단가 전달\n나)비타민 EC 제재 생산관련 문의\n- 현재 결정사항 없음 \n- 수온의 영향이 커 더 떨어져야 결정 가능\n- 결정시 견적 요청예정\n\n2)동성동물약품/실장\n가)신제품 홍보 관련 논의\n-양돈 제품 판매 가장 많음\n-나노비타믹스 / 장프로 적용가능품목 소개\n-관련 팜플렛 및 자료 전달\n (대표전달 예정)\n나) 대표일정관련 논의\n- 외부일정 많아 유선으로 미팅 논의요청\n\n3)한우협회 진주시 지부\n- 한우숯불구이 축제로 인해 추후 미팅하기로함\n\n4)합천돼지자가 / 유정례 실장\nDCP 27,000kg 주문 및 출고 요청함\n24일(월) 입고 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["뉴월드 아쿠아","동성동물약품","합천돼지자가"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1763594245580169","msg_ts":"1763594245.580169"},{"date":"2025-11-20","raw_text":"작성일자*\n2025-11-20\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)전국한우협회 경주시 지부 / 실장\n협회 회원 900여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 협회 지원사업 및 보조사업 없음\n- 대부분 농가에서 필요한 제품 구매해서 사용중\n나) 지부회의 관련 문의\n- 금주 한우축제 이외 행사 및 회의 일정 없음\n다) 수정란 사업 관련 문의\n- 현재 진행하지 않고 있으며 내후년 진행할 예정\n라)협회 회원 통해 최삼호 대표 연락처 수령\n금일 유선 통화 진행했으나 해외일정 및 행사참여 등으로 추후 미팅하기로함\n- 경북한우경진대회 최우수상 수상자\n\n2)안강연합낙우회 / 실장\n남양 ,매일 우유 30개 농가 구성\n가)지원사업 관련 문의\n- 지원금 적은 문제로 인해 단가 낮은 제품으로 진행될 계획\n- 내년 2월 진행될지 자세한 시기는 공문 받아야 알수 있다고 함\n나) 제품 소개 및 농가 홍보 요청\n다) 추후 일정 나오면 리스트 요청한다고 함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회 경주시 지부","안강연합낙우회"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1763683456342389","msg_ts":"1763683456.342389"},{"date":"2025-11-25","raw_text":"작성일자*\n2025-11-25\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 노엘목장 / 신창호 대표\n가) 파인애플 분말 샘플 전달 \n- 급여방식 및 이전 제품과 비교 요청\n- 익일부터 급여 예정 \n- 한달후 체크 결과 미팅진행하기로함\n\n나) 부산사료 / 김지은 과장\n가) 보호지방 시황 전달\n- 하이팻 2톤 주문 및 발송 요청함\n나) 설사72 사용 관련 문의\n- 대표 확인후 전달 해주기로 함\n\n다) 부경양돈 / 김덕민 계장\n-라이신 시황 공유 및 시장 단가전달\n\n라)코리아에프앤에프 / 구본석 차장\n가) 인산킬슘 및 대두박 시황 전달\n대두박 25톤\nMCP 1톤\n주문 및 발송요청함\n\n마)합천돼지자가 / 유정례 실장\n가) DCP 27톤 주문 및 발송요청함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["노엘목장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1764112370058519","msg_ts":"1764112370.058519"},{"date":"2025-12-01","raw_text":"작성일자*\n2025-12-01\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)종합동물약품 / 정상일 대표\n경남 합천 소재\n양돈쪽 위주 취급\n가)회사 및 취급품목 소개\n- 나노비타믹스 , 비타쎄 , 장프로 등 소개\n- 장프로 관심 표명\n- 관련 자료 전달 및 농가 대상 테스트 가능여부 확인 요청\n\n2)합천축협 / 신성환 대리\n가) 원료 시황 공유 \n-보호지방 및 인산칼슘 시황 전달\n나) 이진호 과장 외부 일정으로 인한 유선 통화\n- 추후 미팅시 원료 관련 논의진행예정\n\n3) 동방농장 / 차경호 대표\n가) 코코시스 200kg 주문 및 발송요청함\n(2,800원/kg)\n\n4)서광목장 / 이창형 대표\n가)회사 소개 및 취급 품목 설명\n- 관련자료 전달 \n- MCP/DCP 단가 전달\n\n5)노엘목장/ 신창호 대표\n가) 파인애플 분말 사용 관련 문의\n- 특이사항 없이 사용 \n- 급여기간 적어 판단하기는 이르다는 의견\n*2. 특이사항 (신규발생 및 이슈발생)*\n동방목장 코코시스 신규발송\n*3. 대표 특별보고 및 지시사항*","clients":["종합동물약품","합천축협","동방농장","서광목장","노엘목장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1764632763416129","msg_ts":"1764632763.416129"},{"date":"2025-12-02","raw_text":"작성일자*\n2025-12-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)한성동물병원 / 이현정 원장\n가)신제품 판매관련 논의\n-초유아이지 매입단가 조정 요청 \n축협 적용 이익율 일반 병원등에 적용시 판매 제약 있음\n이익율 조정가능시 재 논의 해보기로 함\n\n2)그레니에 / 김준연 과장\n가) 원료 공급 관련 논의\n- 대두박 공급 관련 문의\n의성축협 OEM 으로 인해 자체적으로 당장 바꾸기는 쉽지 않음\n- 비타민 프리믹스 적용건 관련 논의\n- 지속적인 원료 시황 공유 요청\n\n3)한우협회 안동 / 김충섭 사무국장\n- 협회 방문 (직원 출근 하지 않음)\n유선으로 사무국장 연결했으나 태국일정으로 인해 5일 귀국후 미팅하기로함\n\n4)부경양돈 / 김덕민 계장\n가) 입찰 공고 일정 및 품목 체크\n\n5)백제약품 / 이상진 이사\n가) 결제일 관련 사항 논의\n매월 말일로 하되 25일 이후 발주건 익월 결제\n\n6)거창 신정범 대표\n설사 72 1Box 주문 및 발송요청함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["한성동물병원","그레니에","한우협회 안동","부경양돈","백제약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1764718586278229","msg_ts":"1764718586.278229"},{"date":"2025-12-03","raw_text":"작성일자*\n2025-12-03\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)한우협회 상주시 지부 /실장\n협회 회원 600여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 협회 지원사업 및 보조사업 없음\n- 대부분 농가에서 필요한 제품 구매해서 사용중\n나) 지부회의 관련 문의\n- 올해 회의 일정 없음\n다) 수정란 사업 관련 문의\n- 축협에서 관할 하고 협회는 따로 진행사항 없음\n라)매주 화요일 경매시장 진행\n- 업체 팜플렛이나 홍보물 사무실내 비치 해놓고 볼수 있게 해놓고\n  매주 화요일 경매시장에 나와 홍보 하기도 함\n  기계 위주로 비치하기는 하나 첨가제 종류는 한적없어 사무국장 통해   \n  문의 요청 (금일 유선 통화연결 안됨)\n\n2)한우협회 구미시 지부 / 농가대표\n 협회 회원 610여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 지원사업 진행  / 초유 설사 예방제 등\n- 내년 진행여부 실장통해 문의 요청\n나) 지부회의 관련 문의\n- 올해 회의 일정 없음\n다) 수정란 사업 관련 문의\n- 축협에서 관할 하고 협회는 따로 진행사항 없음\n※금일 실장 부재중 / 협회 회원들 있어 문의함\n-자세한 사항 익일 실장과 통화 진행하기로 함\n\n3) 여물(주) 상주TMR /실장\n가) 회사소개 및 취급품목 소개\n- 고려산업에서 모두 진행해 따로 원료 구매 하지 않음\n나) 뉴트리신 제품 홍보물 사무실내 비치 및 소개 요청\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["한우협회 상주시 지부","한우협회 구미시 지부","여물(주) 상주TMR"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1764806292964649","msg_ts":"1764806292.964649"},{"date":"2025-12-04","raw_text": 린 제품 급여 \n- 초유아이지 긍정적이라 재고 소진후 사용예정\n\n2) 부경양돈/ 김덕민 계장\n가) 입찰 일정 관련 문의\n- 15일(월) 공고 업로드 예정/ 24일(수) 입찰 예정\n\n3)경북수산/ 최율호 대표\n가) 비타민 E 제재 관련 논의\n- 중국알리 사이트 내 비타민 E 원료 판매 제품 관련 사항 전달\n나)정우수산 비타민E 25kg 주문 및 발송요청\n    조양수산 비타민E 25kg 주문 및 발송요청\n\n4)KB동물병원 / 임권빈 원장\n가)농가 실험 관련 논의\n- 진주지역 관리 농장으로 컨텍 예정이며 차주 자세한 내용 파악 전달 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["우정농장","부경양돈","경북수산","KB동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1765756261773849","msg_ts":"1765756261.773849"},{"date":"2025-12-15","raw_text":"작성일자*\n2025-12-15\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)전국한우협회 예천군 지부 / 김달년 사무국장\n협회 회원 1,000여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 도 사업은 대부분 지역 도내 생산업체와 묶여 있음\n(ex)규산염 ,면역강화 사업\n- 시군 자체 사업은 기존 업체와 유착관계 있어 신규 업체는 진입 어려움\n-보조사료는 관리 어렵고 농가 자부담50% 이유로 기본 물량 채우기 어려움\n나) 수정란 사업 관련 문의\n- 작년 도사업 있었으나 거의 사업 종료 분위기 \n(정액 쪼개는 방향으로 진행중)\n\n2)주천동물약품 / 실장\n가)회사 및 신제품 소개\n- 초유아이지 , 나노비타믹스 등 품목 소개\n나) 초유분말 관련 문의\n-설스메이트 , 단바이오 판매중 \n-초유아이지 판매 및 홍보 요청\n다) 비타민제 관련 문의\n- 슈퍼카우 판매중\n- 번식 농가 타겟 나노비타믹스 적용 판매 요청\n- 비타민 프리믹스 생산 관련사항 전달\n\n3)고려산업 / 전민규 차장\n가) 입찰 관련 문의\n-MDCP ,황산염라이신 ,메치오닌등 8개 품목\n- 19일(금) 입찰 마감 / 22일(월) 입찰 결과 통보예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["전국한우협회 예천군 지부","주천동물약품","고려산업"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1765841029695189","msg_ts":"1765841029.695189"},{"date":"2025-12-16","raw_text":"작성일자*\n2025-12-16\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 부경양돈 / 김덕민 계장 \n이재석 부사장 동행\n가) 입찰 관련 논의\n- 메치오닌 트레오닌 라이신 예가 및 시황 공유\n- 타업체 관련 사항 체크\n나) 코코시스 단가 인상안 논의\n- 금일 인상 견적서 및 단가인상요인 파일 전달\n\n2)영광 가축약품 / 이은종 대표\n가)신제품 소개 및 적용요청\n- 나노비타믹스 , 비타쎄 , 장프로 등 소개\n- 장프로 관련 자료 전달 및 판매 요청\n- 농가 테스트 관련 해서 내부 논의후 결정하기로함\n\n3)오케이 / 류하나 부장\n가) MDCP 입고일 변경 사항 전달\n-18(목) ->17일(수) 변경\n\n4)KB 동물병원/ 임권빈 원장\n가) 비타쎄 농가 실험 관련 논의\n경남 함안 소재\n 7만2천수\n50주이상,60주이상 2개동\n1월 초 실험 예상\n실험 전 파악 내용 필요해 추가 미팅후 진행예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["부경양돈","영광 가축약품","오케이","KB 동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1765927209502599","msg_ts":"1765927209.502599"},{"date":"2025-12-17","raw_text":"작성일자*\n2025-12-17\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 서라벌 목우회 / 정원진 회장\n가) 취급 품목 홍보 및 농가 소개 요청\n-나노비타믹스, 파인애플 분말 등 \n나)지원사업 연계 관련 문의\n- 내년도 지원사업 기존 30%삭감되어 필요부분 확인중\n- 리스트 취합시 자사 제품 가능여부 검토 요청\n\n2)JH 수산 \n가) 회사 소개 및 비타민 관련 논의\n- 양석환 대표 다른업으로 인해 양식장은 양준혁 대표가 하고 \n  양석환 대표가 도움주는 방향으로 진행예정\n- 금일 양준혁 대표 서울 방송 촬영일정으로 인해 부재중\n- 유선연결 되지 않음\n- 추후 미팅 진행시 홍보관련 사항 논의예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["서라벌 목우회"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766018122476779","msg_ts":"1766018122.476779"},{"date":"2025-12-18","raw_text":"작성일자*\n2025-12-18\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)영업회의\n가) 사료공장 거래처 담당자 조정\n나) 송년회 진행\n\n2) 삼솔농장 / 한기웅 지회장\n나노비타블럭 1,000kg 주문 및 발송요청함\n1box 40,000원 공급\n*2. 특이사항 (신규발생 및 이슈발생)*\n삼솔농장 - 나노비타블럭1,000kg출고\n*3. 대표 특별보고 및 지시사항*","clients":["삼솔농장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766357837806759","msg_ts":"1766357837.806759"},{"date":"2025-12-19","raw_text":"작성일자*\n2025-12-19\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1. 기본사항 \n1)마산가축약품 /김동호 원장\n가) 신제품 소개 및 판매요청\n- 양돈 이외 축종 제품 판매중\n- 초유아이지 , 닥터엔등 판매요청\n나)비타민 프리믹스 관련 논의\n\n2)코리아에프앤에프/구본석 차장\n대두박 25,000kg 주문 및 발송 요청함\n22일(월) 입고 예정\n\n3)부경양돈 / 김덕민 계장\n가) 코코시스 단가 인상 관련 문의\n나) 입찰 품목 샘플 전달 요청\n-발송완료\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["마산가축약품","코리아에프앤에프","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766357860383489","msg_ts":"1766357860.383489"},{"date":"2025-12-22","raw_text":"작성일자*\n2025-12-22\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)송정농장 / 박기철 대표\n가) 신제품 소개 및 적용요청함\n- 나노비타믹스 ,초유아이지 , 이지스타터등\n나) 주위 농가 소개 요청\n- 테스트 농가 적용 가능여부 확인 요청\n\n2)노엘목장 / 신창호 대표\n가) 파인애플 분말 100kg 주문 및 발송요청함\n- 생산일정 전달\n나)이전 제품 비교 특이사항 \n- 좀 더 사용해봐야 특이사항 알수 있을것으로 예상\n\n3)KB 동물병원 / 임권빈 원장\n가) 비타쎄 적용 관련 논의\n- 1월 진행 ->2분기 하절기 적용 변경\n- 이후 결과도출후 공동사업 가능여부 결정하기로 함\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["송정농장","노엘목장","KB 동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766445991789379","msg_ts":"1766445991.789379"},{"date":"2025-12-23","raw_text":"작성일자*\n2025-12-23\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1기본사항\n1)뉴월드 아쿠아 /김정순 대표\n가) 비타민 시황 공유 \n- VC 97% , VE50% 단가 전달\n나)비타민 EC 제재 생산관련 논의\n다) 판매건 수수료 지급 방안 논의\n\n2)한우협회 거제시지부 / 배홍권 사무국장\n가) 지부내 지역모임 참석 및 저녁식사 진행\n참가인원 9명\n나) 신제품 소개 및 지원사업 관련 논의\n- 내년 1월 중순 지원사업 품목 선정 논의\n현재 면역증강제 , 초유 등 사업으로 진행\n초유의 경우 거제시 지원품목으로 무상진행\n-추후 협회 모임에서 관련 사항 재논의 예정\n(나노비타믹스 대상품목으로 논의예정)\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["뉴월드 아쿠아","한우협회 거제시지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766704007850489","msg_ts":"1766704007.850489"},{"date":"2025-12-24","raw_text":"작성일자*\n2025-12-24\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)양산기장TMR/ 김기윤 팀장\n가)보호지방 단가 및 시황 논의\n- 팔미트산 2500원 사용중 (변동사항 없음)\n나)염화콜린 적용 문의\n-시황 및 예상공급가 전달\n\n2)부경양돈 / 김덕민 계장\n가) 입찰 참가\n품목 - 메치오닌,트레오닌,황산염라이신\n-메치오닌 4개업체 참가\n세인,희우,세계로,CJ\n3240원 희우 낙찰\n2등 세인 3590원\n이외 업체 3600원초반 형성(10원~50원사이) \n\n-트레오닌 5개업체 참가\n세인 CSF,ENT,세계로,희우\n1396원 희우 낙찰\n이외 업체 1440원~1480원대 \n\n-황산염라이신 7개업체 참가\n세인, 희우, 은진 ,세계로, 대현, ENT, CSF\n749원 CSF 낙찰\n2등 희우 780원\n800원대 세계로 대현 ENT\n900원대 세인 은진 \n\n나) 임종업 팀장\n-코코시스 단가인상 필요성 제시 \n-긍적적인 검토 요청\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["양산기장TMR","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766704032893849","msg_ts":"1766704032.893849"},{"date":"2025-12-26","raw_text":"작성일자*\n2025-12-26\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)하나가축약품 / 김대원 대표\n가) 신제품 소개 및 판매요청\n- 초유아이지 , 닥터엔등 판매요청\n- 나노비타믹스 관련 자료 전달 요청 및 전달 \n나)언양가축약품 관련 논의\n- 대표 해외출장중이라 연초 동행 방문하기로함\n\n2)통일동물병원 / 백원원 원장\n가) 제품 판매 관련 논의\n- 11월 12월 판매제품 관련 계산서 처리 관련 사항 전달\n- 비타블럭 판매분 관련 사항 월요일 재 논의 하기로함\n나)협회 관련 논의\n- 진행 사항 공유 및 추후 설명회 참석 요청\n\n3)부경양돈 / 김덕민 계장\n코코시스 4,000kg 주문 및 발송 요청함\n30일(화) 입고 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["하나가축약품","통일동물병원","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1766965719569819","msg_ts":"1766965719.569819"},{"date":"2025-12-29","raw_text":"작성일자*\n2025-12-29\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)한우협회 김천시 지부 /실장\n협회 회원350여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 보조사업은 시단위로 진행(1월말 신청) - 시청홈페이지 참조\n (신규 진입은 어려울것이라함)\n- 한우농가는 많으나 협회 가입농가는 일부에 불과 (1000여 농가중 350농가)\n나) 지부회의 관련 문의\n- 올해 회의 일정 없음\n다) 수정란 사업 관련 문의\n- 과거 일부있었으나 작년에는 없었음 \n- 협회차원에서 확인하기 어려움\n라) 지부 사무실내 신제품 홍보물 비치\n\n2)김천축협 동물병원 / 과장\n가) 회사 소개 및 신제품 소개\n- 원장 병원 출근 거의 하지 않고 현지 출퇴근 진행\n나) 초유분말 \n- 단바이오 , 초유솔루션 (경북상주 업체 올루션)\n다) 신제품 홍보물 원장 전달 요청\n\n3)한우협회 영천시 지부 /실장\n협회 회원 550 여농가\n제품 소개 및 홍보물 전달\n가)협회 지원사업 관련 문의\n- 2월 신청접수 / 3월 교부 결정\n- 신청 및 진행은 딜러 통해 진행\n- 협회와 업체 직거래는 하지 않음\n- 품목은 면역강화제 위주 (조달청 등록 품목 위주)\n나) 지부회의 관련 문의\n- 올해 회의 일정 없음\n- 지부장 연임후 연초 이사회 예정\n- 3월전후 한마음 대회 진행시 전 회원 참석예정\n다) 수정란 사업 관련 문의\n- 일부 있으나 축협 중심 \n- 1월~2월 축협진행할수도 있다함\n라) 지부 사무실내 신제품 홍보물 비치\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["한우협회 김천시 지부","김천축협 동물병원","한우협회 영천시 지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1767053119146119","msg_ts":"1767053119.146119"},{"date":"2025-12-30","raw_text":"작성일자*\n2025-12-30\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 부경양돈/ 김덕민 계장, 임종업 팀장\n가) 코코시스 단가 안상안 논의\n- 코코시스 단가 인상안 검토 재요청\n- 1월 중순적용으로 추후 단가 인상안 전달예정\n나) 원료 공급 관련 논의\n- 희우 TCP 공급관련 문의\n TCP 재고 부족으로 인해 MCP 납품중 \n->TCP 단가로 공급중이라 1대 1천만원 손해 예상\n-MCP 재고분도 부족한것으로 파악\n\n2)통일동물병원 / 백원원 원장\n가) 신제품 홍보 및 판촉 관련사항 논의\n- 내년 축협 조합장 관련해서는 원장님이 신경쓰기로함\n- 한우협회등 설명회등 일정 컨펌후 동행하기로함\n나) 수수료 관련 논의\n- 나노비타믹스 판매건 포함 수수료 논의\n- 기존 계약서에 나노비타블럭등 추가하여 재작성 필요\n\n3)코리아에프앤에프 / 구본석 차장\n가) 대두박 시황 전달 및 1월 단가 전달\n- 630원-> 650원 전달\n\n4) 인섹트바이오텍 / 김득상 대표\n가)원료 관련 논의\n- 포도당 , 단백피등 중국 중국 성타이 회사에서 국내 공급 가능 어필\n- 성타이와 직거래 루트 만들어줄 의향 있어 진행 해보자는 의견\n- 관련사항 이재석 부사장 전달\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["부경양돈","통일동물병원","코리아에프앤에프","인섹트바이오텍"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1767139221442649","msg_ts":"1767139221.442649"},{"date":"2025-12-31","raw_text":"작성일자*\n2025-12-31\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 부산사료 / 김지은 과장\n가) 보호지방 시황 전달 \n- 추가 원료공급 여부 논의\n나)설사72 사용 여부 확인\n- 대표와 논의되지 않아 확인후 재 논의 예정\n\n2) 부경양돈/ 김덕민 계장\n-TCP 재고 관련 문의\n희우 공급불안으로 인해 대체공급 가능성 \n재벙문시 관련 사항 문의 예정\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["부산사료","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1767309706729029","msg_ts":"1767309706.729029"},{"date":"2026-01-02","raw_text":"작성일자*\n2026-01-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 우림피드 / 실장\n가)회사 소개 및 원료 소개\n- 원료구매 대표 직접 구매중\n- 원료위주 사용 /첨가제 사용하지 않음\n- 대표 연락처 수령 및 미팅 진행요청\n\n2)대원가축약품 / 이상훈 원장\n가) 신제품 소개 및 홍보물 전달\n- 초유아이지 , 나노비타믹스 ,나노비타블럭등\n나) 초유분말 관련 문의\n- 단바이오 제품 사용중\n- 비교 설명 및 단가 제안\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["우림피드","대원가축약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1767568952269149","msg_ts":"1767568952.269149"},{"date":"2026-01-05","raw_text":"작성일자*\n2026-01-05\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)송정농장 / 박기철 대표\n가) 신제품 소개 및 적용요청함\n- 나노비타믹스 ,초유아이지 , 이지스타터등\n나) 주위 농가 소개 요청\n- 테스트 농가 적용 가능여부 확인 요청\n\n2)우정농장/김현우 대표\n가)신제품 소개 및 적용요청함\n- 번식율 개선 나노비타믹스 적용 권유\n나) 기타 신제품 적용 문의\n다) 수정율 낮은 농가 소개 요청\n\n3)시현축산/하광봉 대표\n가)하우린 제품 소개 및 적용 권유\n나)나노비타믹스 건 재고 비타민 소진후 사용고려중\n다)황산염 라이신 1,000kg , 비테인 200kg 주문 및 발송요청함\n\n4)오앤티 / 공제우 부장\n가) 염산염 라이신 제조사 정보 공유 요청\n- 제조사 카다로그 및 자료 왕려원 과장 전달 요청\n- 익일 단가 전달 예정\n\n5)인섹트바이오텍 / 김득상 대표\n가) 포도당 , 단백피등 관련 단가 전달 예정 \n- 회사 논의 희망\n*2. 특이사항 (신규발생 및 이슈발생)*\n\n*3. 대표 특별보고 및 지시사항*","clients":["송정농장","우정농장","시현축산","오앤티","인섹트바이오텍"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1767657609837279","msg_ts":"1767657609.837279"},{"date":"2026-01-06","raw_text":"작성일자*\n2026-01-06\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)합천돼지자가 / 유정례 실장 , 이웅기 총무이사\n가) DCP obs.slack.com/archives/C08S1SBMNNL/p1769990609537649","msg_ts":"1769990609.537649"},{"date":"2026-02-02","raw_text":"작성일자*\n2026-02-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 천년TMF / 조광제 상무\n가)원료 시황 논의 \n- 메치오닌 시황 및 평균단가 전달\n- 비타민 관련 셀레늄 등으로 배합비 설계\n- 중조 배합비 제외 / 일정구간에서만 사용했으나 제외\n- 아미노산 , 비타민 정기적인 견적서 전달 요청\n\n2)대덕농산 /최병기 대표\n가)원료 시황 논의\n- 보호지방 . 염화콜린 시황 전달 및 배합가능여부 확인\n- 기본 완제품 공급받아 특정 농가 필요시 원료 구매 및 판매진행\n- 단가 전달 및 농가판매 요청\n\n3) 부경양돈 / 김덕민 계장\n가) 제면박 단가 인상안 관련 논의\n- 1월 적용으로 단가 10원 인상 확인\n- 일시적인 단가 인하로 인해 기존계약서 유지\n*2. 중요 사항*","clients":["천년TMF","대덕농산","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1770077222267399","msg_ts":"1770077222.267399"},{"date":"2026-02-03","raw_text":"작성일자*\n2026-02-03\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 부경양돈 / 김덕민 계장\n가) 2월 입찰 관련 문의\n- TCP ,MDCP 예가 견적서 전달\n  (770원/ 1310원)\n- 희우 TCP 987원 전달 \n나)원료 수급현황 문의\n- 희우TCP 대체 MDCP 1대 추가 입고\n  2월 선적진행 이후 TCP 공급예정\n\n2)대지농장 / 최삼호 대표\n한우협회 경주시 지부 소속\n가)신제품 소개 및 적용가능여부 확인\n- 경주축협 TMR 완제품으로 급여 / 첨가제는 거의 사용하지 않음\n나)지부장 통해 제품 소개 요청\n-이영철 지부장 유선연결 했으나 해외에 있어 귀국후 재연락 하기로함\n\n3)지정낙우회 / 이기규 회장\n가)제품 적용 관련 논의\n- 나노비타믹스 , 파인애플분말 지원사업 및 농가 홍보요청\n- 제품 홍보물 및 단가 전달\n\n4) 한우협회 거제시지부/ 배홍권 사무국장\n가) 제품 지원사업 연계 관련 문의\n- 거제축협에서 비타민 ,면역증강제 등 임의선정 진행\n*2. 중요 사항*","clients":["부경양돈","대지농장","지정낙우회","한우협회 거제시지부"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1770162510819619","msg_ts":"1770162510.819619"},{"date":"2026-02-04","raw_text":"작성일자*\n2026-02-04\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1) 한우협회 청도군지부 / 실장\n 협회소속농가 210개 \n가) 지원사업 관련 논의\n올해 지원사업 첨가제 종류는 하지 않음\n건초 정도 지원사업으로 진행예정\n나)신제품 소개 및 협회 내 팜플렛 비치\n다) 이사회 관련 일정\n- 비정기적으로 진행으로 픽스된 일정은 없음\n- 추후 이사회 소집시 연락주기로함\n라)수정란 사업 문의\n- 자세한 내용 알지 못함\n\n2)청도축협 동물병원 / 김상은 수의사\n가) 신제품 소개 및 판매 요청\n- 신규 품목 입고 관련 수의사는 관리개념으로 진행\n- 품목 입고 가능한 루트는 딜러통해 가능하다함\n- 결정권자가 아니며 같은 제품군 충돌로 인한 문제 우려\n- 축협 / 협회등 제품사용 분위기가 생기면 가능\n- 지속적인 관계유지로 만들어가자는 의견 \n\n3)청도축협 동천이지점 / 이정훈 과장\n가)신제품 소개 \n- 수태율이 전반적으로 떨어져 수태율 향상 제품 소개 요청\n- 나노비타믹스 제품 설명 및 추천\n- 농가입장 수정비 / 정액/ 비타민/ 첨가제 등에는 지출 \n  수태율만 올라가면 지출한다는 의견\n- 익일 개량관련 정기총회 (참석자40~50명) 예정이라 제품설명회 요청\n->최근 전염성 질병 이슈로 인해 외부인원을 꺼리고 사전 조율되지 않아 어려움\n-분기별로 진행되기에 2분기에 참석하기로함 \n(타사 설명 진행시 홍보물 + 샘플로 진행해야 농가호응이 좋았다는 의견)\n\n4)우정농장 / 김현우 대표(수정사)\n가) 신제품 소개 \n- 나노비타믹스 농가 사용 제안\n대상 : 수태율 저하 및 수정란 사업 진행농가\n 현재 수태율 /재귀발정단축등 타겟 동일 제품\n->한국썸벳 \"아도헬스플러스\" 많이 사용\n1kg 12700원 구매 \n나노비타믹스 20kg 샘플 제공 및 비교요청\n-초유아이지 소개\n농협사료 진심초유 100g x 5ea 51200원 구매\n나) 축협 / 한우협회 관계자 통화연결진행\n- 두곳 모두 지원사업 종료 \n- 한우협회(사무국장)의 경우 제품 추가 할수 있도록 요청\n\n5)백제약품 /이상진 이사\n가)초유아이지 생산 관련 문의\n- 명절 전후 상황 공유하기로함\n\n6)부경양돈 / 김덕민 계장\n- 코코시스 4,000kg 주문 및 발송요청함\n6일(금) 입고예정\n*2. 중요 사항*","clients":["한우협회 청도군지부","청도축협 동물병원","청도축협 동천이지점","우정농장","백제약품","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1770246768588939","msg_ts":"1770246768.588939"},{"date":"2026-02-05","raw_text":"작성일자*\n2026-02-05\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)고성축협 축산과/이현주 과장\n가) 지원사업 관련 논의\n- 기자재 위주 지원사업 진행중\n- 첨가제 관련 품목 잘 모름\n(미네랄 블럭 지원사업 품목 있었으나 올해 일정등은 \n 아직 나오지 않은 상황)\n- 농업기술센터쪽 문의요청\n-수정란 사업은 진행했으나 결과 좋지 않아 올해는 진행안함\n\n2) 한우협회 고성군 지부 / 실장\n가)신제품 소개 \n- 이전 사무국장 통해 제품소개 진행했으나 실장 소개 요청\n- 각 제품별 특성 소개 및 지원사업 연계 요청\n- 현재 일정이 나오지 않아 홍보물 협회 내 비치 \n- 예상보다 공고일이 늦어진다는 의견\n\n3)오앤티 / 공제우 부장\n가)라이신 입고 관련 문의\n- 금일 입고 완료\n*2. 중요 사항*","clients":["고성축협 축산과","한우협회 고성군 지부","오앤티"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1770334114738809","msg_ts":"1770334114.738809"},{"date":"2026-02-09","raw_text":"작성일자*\n2026-02-09\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)뉴트리신 회의\n- 대리점 영업계획 논의 및 경쟁제품 관련 논의\n2)경영전략회의\n- 부서별 특이사항 공유\n3)류미화 상무 근속 20주년 행사\n*2. 중요 사항*","clients":[],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1770766626655189","msg_ts":"1770766626.655189"},{"date":"2026-02-10","raw_text":"작성일자*\n2026-02-10\n*작성자*\n<@U08PUV8B431|박제영>\n*1. 일일 업무*\n1.기본사항\n1)합천돼지자가 / 유정례 실장\n가)DCP 단가 인상 관련 논의\n나)배합비 적용 원료 문의\n - 황산염 라이신 / CJ 사용중 \n\n2)노엘목장 / 신창호 대표\n가)파인애플 분말 사용관련 논의  (일반보고)*\n1.기본사항\n1)부경양돈 / 조재희 계장\n가)원료별 시황 공유\n-5월 단가 인상안 확인\n- 메치오닌 7000원 적용 \n- 트레오닌 2000원 적용\n- 황산염라이신 CSF 단가 인상 없음\n나)창고 방문\n- 메치오닌 NHU , 에보닉 제품 입고 확인\n- 제품 로뜨 번호 담당자 전달\n\n2)네츄럴EX / 김현정 과장\n- 경남 김해 소재\n반려동물 사료제조 (애견 수제간식)\n대부분 화학첨가물 최소화 / 천연원료 사용\n소고기,닭, 오리등 그대로 건조하여 제품화\n가) 회사소개 및 취급품목 안내\n-비타민 / 아미노산제 소개 및 적용가능 원료 논의\n- 껌/ 종합영양제등에 접목 가능 (메인제품에는 미포함)\n- 원료결정권자(이사) 금일 부재중으로 인해 취급품목 일로 전달요청\n\n3)제이제이바이오/ 김승훈 과장\n가) 적용가능 원료 단가 전달안 관련 논의\n- 현재 타우린 3700~3900원 사용/VC35% 3400원 사용중\n- 견적가 차이에 대한 부분 전달\n- 지속적인 원료 시황 공유 요청\n\n4)합천돼지자가 / 유정례 실장\n가)DCP 공급 단가 관련 문의\n- 단가 관련 사항 전달 / 4월부터 인상안 적용\n\n5)통일동물병원 /백원원 원장\n가)뉴트리신 이전판매건 세금계산서 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부경양돈","네츄럴EX","제이제이바이오","합천돼지자가","통일동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778195824098249","msg_ts":"1778195824.098249"},{"date":"2026-05-08","raw_text":"작성일자*\n2026-05-08\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)오케이 /류하나 부장\n가)MDCP 시황 공유\n-MDCP 27,000kg 주문 및 발송요청함\n 12일 (화) 입고 예정\n\n2)경주/ 김일준 대표\n가) ECM 입고 관련 논의\n- 자체 픽업 및 택배비 결제\n- 관련 사항 제외 거래명세서 전달\n\n3)부경양돈 / 조재희 계장\n가) 제면박 견적 전달 관련 논의\n- 제면박 시황 공유 및 차주 월요일 견적서 전달 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["오케이","경주","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778455467826729","msg_ts":"1778455467.826729"},{"date":"2026-05-11","raw_text":"작성일자*\n2026-05-11\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)송정농장/ 박기철 대표\n가) 뉴트리신 제품 적용 관련 논의\n- 면역 글로블린 제품 사용 및 초유아이지 적용 요청\n- 검정 전문 농가 모임시 제품 홍보 요청\n- 연1~2회 진행중\n\n2)우정농장 / 김현우 대표\n가) 농가 컨설팅시 제품 적용 요청\n- 나노비타믹스 접목 가능여부 확인 요청\n- 수정란 사업 관련 논의\n나)울산지역 26년 지원사업 일정 확인 요청\n\n3)코리아에프앤에프/ 구본석 차장\n가) MCP 1,000kg 주문 및 발송요청함\n15일(금) 입고 예정\n\n4) 부경양돈 / 김덕민 계장\n가) 조재희 계장 퇴사 예정 \n- 김덕민 계장 사료부 재발령 \n- 11일 사료공장 출근\n나) 제면박 재계약건 견적서 제출\n  (410원/kg)\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["송정농장","우정농장","코리아에프앤에프","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778544399452759","msg_ts":"1778544399.452759"},{"date":"2026-05-12","raw_text":"작성일자*\n2026-05-12\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 한승트레이딩 / 한창수 대표\n가)제품 소개 및 판매방안 논의\n- 나노비타믹스 / 비타쎄 제품 양돈 양계 적용 \n- 단가 전달 및 제품 포인트 공유\n- 테스트 농가 확인요청\n(현재 산란계 가격이 좋은 상황 / 적용 시기 선택중요)\n나)제품 홍보물 전달  \n\n2)부경양돈 / 김덕민 계장\n가) 코코시스 적용의 건(하절기 스팟)\n- 견적서 2,300원 전달 \n- 시험성적서 . 성분등록증 전달\n\n3)한펠 / 정소영 이사\n가) 부경양돈 견적서 전달의 건\n- 견적서 2,320원 전달 요청\n(이전 견적과 동일)\n\n4)오케이 / 류하나 부장\n가)MDCP 입고일 변경의 건\n- 금일 우천으로 인한 입고일 변경\n  12일(화)->13일(수)\n\n5)영광축산 / 박현규 대표\n가) 코코넛 분말 관련 논의\n- ECM ECM40 코코시스 포장 단위 및 단가전달\n나)코코시스 여름철 사용관련 농가 홍보 요청\n나)BHT 적용 관련 문의\n- 적용 초반이라 추후 결과 공유예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한승트레이딩","부경양돈","한펠","오케이","영광축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778630289695679","msg_ts":"1778630289.695679"},{"date":"2026-05-13","raw_text":"작성일자*\n2026-05-13\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 부산사료 / 김지은 과장\n가) 보호지방 시황 공유\n- 하이팻 6월 인상안 공유 및 인상안 전달\n(6월 2700원 적용)\n나)기타 접목가능 원료 논의\n- 취급원료 전달 및 대표 미팅 진행 요청\n\n2)한우협회 의령군 지부 / 실장\n가) 정기회의 일정 관련 논의\n- 5월 회의 일정없음\n- 회원 대상 제품 홍보 의사 전달 \n ( 회의 또는 소규모 모임시 해당 사항 공유하기로함)\n나) 지원사업 일정 문의\n- 현재 정해진 사항은 없음 \n- 의령축협과 함께 진행되므로 해당사항 전달시 공유요청\n\n3)오케이 / 류하나 부장\n가) 입고 관련 논의\n- 입고시 갑빠 체크후 출고요청\n- 소독과 계근 동시 진행\n- 해당사항 공유\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부산사료","한우협회 의령군 지부","오케이"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778716781043269","msg_ts":"1778716781.043269"},{"date":"2026-05-14","raw_text":"작성일자*\n2026-05-14\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)부경양돈 / 김덕민 계장\n가)인산칼슘 , 아미노산 시황 공유\n- 희우 6월 단가 인상 내용 현재까지 없음\n( 인상 진행 관련 문의 요청)\n나)코코넛 분말 서류 작성\n- 코코시스 2,300원 계약서 작성\n- ECM 단가 조정안 작성\n다)제면박 계약건 승인대기중 \n- 차주 계약서 작성 예정\n라)조재희 계장 익일부로 퇴사진행\n\n2)코리아에프앤에프/ 구본석 차장\n가)원료 시황 공유\n- 대두박 단가 전달 및 시황 공유\n- 함안축협 대두박 (640원 이하)\n- 단가 조정 필요\n나) MCP 입고 관련 사항 전달\n\n3) 코팩스 / 이하영 과장\n부산소재 / 전남 나주 공장 \n뱀장어 사료 생산업체\n가) 회사 소개 및 취급 원료 안내\n- 아미노산 접목 가능 품목 공유 요청\n- 담당자 출장으로 인해 메일로 전달 요청\n\n4)거래명세서 전달 및 입금요청\n- 영광축산 , 함안 이한섭 대표\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부경양돈","코리아에프앤에프","코팩스"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1778801206963509","msg_ts":"1778801206.963509"},{"date":"2026-05-18","raw_text":"작성일자*\n2026-05-18\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)본사회의\n가)경영전략회의\n- 원료별 시황 공유 / 6월 단가 인상안 회의\n- 인산칼슘 / 아미노산 / 비타민 등\n\n나)영업회의\n- 담당자별 영업사항 논의\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":[],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779232301692679","msg_ts":"1779232301.692679"},{"date":"2026-05-19","raw_text":"작성일자*\n2026-05-19\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)우일축산약품 / 강대규 과장\n가) 농가 테스트 관련 사항 논의\n- 양계 농가 1곳 테스트 진행중\n- 나노비타믹스 적용 양돈농가 컨텍사항 공유\n (현재 농가 컨텍 어려움 있음 / 지속적으로 컨텍중)\n\n2)부경양돈 / 김덕민 계장\n가) 제면박 재계약건 관련 논의\n- 현재 승인대기중 \n나) 제면박 서류 전달 방문일자 논의\n\n3)오앤티 / 공제우 부장\n가)아미노산제 시황 공유\n- 메치오닌 / 염산염 라이신 시황 공유 및 익월 공급단가 전달\n나) 염산염 라이신 8,000kg 주문 및 발송요청함\n- 20일(수) 입고 예정\n\n4)코리아에프앤에프/ 구본석 차장\n가) 대두박 및 MCP 시황 공유\n- 함안축협 대두박 스펙 공유\n CP 43%\n조지방 0.5%\n조섬유 9%\n조회분9% \n620원 이하 견적 수령 \n-지속적 단가 공유 및 해당 스펙 제품 공급 요청\n\n5)경북수산 / 최율호 대표\n가) 비타민 시황 공유\n- 조양수산 비타민E 25kg 주문 및 발송요청함\n- 익월 20,000/kg 적용사항 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["우일축산약품","부경양돈","오앤티","코리아에프앤에프","경북수산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779232364421979","msg_ts":"1779232364.421979"},{"date":"2026-05-20","raw_text":"작성일자*\n2026-05-20\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1. 기본사항\n1)우일가축약품 / 강태규 과장\n가) 뉴트리신 판매 방안 논의\n- 농가 테스트 우선 적용 고려\n(나노비타믹스 / 나노 비타쎄 제품 양돈 양계적용)\n-판매 포인트 전달 \n- 농가 테스트 진행시 여러농가 진행 하지않고 한농가 집중 테스트 요청\n\n\n2)통일동물병원 / 백원원 원장\n이충선 상무 동행\n가) 뉴트리신 제품 판매 관련 논의\n- 병원 홍보 관련 관납 제안\n(우선 언양가축약품 , 하나가축약품으로 진행 가능여부 확인)\n나) 지역 축협동물병원 진행\n- 거창 , 밀양축협 동물병원\n다)경북지역 판매 유통망 확대 방안 논의\n- 우일가축약품/ 경수약품 대상 축종별 검토\n- 추후 방문시 소개예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["우일가축약품","통일동물병원"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779750316959499","msg_ts":"1779750316.959499"},{"date":"2026-05-21","raw_text":"작성일자*\n2026-05-21\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)한국수생명연구소 / 유진형 박사\n이충선 상무 동행\n가) 난황분말 시장적용 가능여부 논의\n- 과거 치어 적용한 원료로 뇌를 형성 시켜주며 단백질 지방 함유로\n  생존 및 성장에 긍정적\n- 시장수요 있을것이라 예상\n\n나) 수입산과의 비교를 통한 포인트 체크\n- 불포화지방산 (EPA ,DHA )및 인지질 함량체크 및 차별 포인트 제시\n\n다)상품적용 관련 포인트 논의\n- 사료투여량은 많지 않고 흐름성 좋은 부형제 상품화 제시\n\n2) 영광축산 / 박현규 대표 \n경남 합천 소재 , 동생부부와 함께 운영\n모돈 220두 . 25년 MSY 27두 , PRRA 음성농장 . 한별팜텍 컨설팅\n가) 세인 제품 적용 관련 논의\n- 나노비타믹스 \n2개월째 사용중 / 비간톨 주사 하지 않고 모돈에서 재귀발정 괜찮다함\n-코코시스 \n자돈 모돈 육성비육돈 적용중\n- 장프로\n신생자돈 설사 (괴사성장염 원인) 장프로 소개 및 샘플 공급예정\n\n나) 종합동물약품 연계 요청 \n- 지속적 방문으로 양돈적용 뉴트리신 제품 판매\n\n3)시현축산 / 하광봉 대표\n가) 비테인 시황 공유\n- 비테인 200kg 주문 및 발송요청함\n22일 (금) 입고 예정\n\n4)코리아 에프앤에프 / 구본석 차장\n가) 대두박 25,000kg 주문 및 발송 요청함\n27일(수) 입고 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한국수생명연구소","영광축산","시현축산","코리아 에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779750346559949","msg_ts":"1779750346.559949"},{"date":"2026-05-22","raw_text":"작성일자*\n2026-05-22\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 합천돼지자가/ 유정례 실장\n가) 인산칼슘 시황 공유\n-  6월 인상 단가 전달 \n   1370원->1470원 인상 견적서 전달 완료\n나)염화콜린 시황 공유\n\n2)오케이 / 류하나 부장\n가) 인산칼슘 시황 공유\n-  6월 인상 단가 전달 \n   1470원->1560원 인상 견적서 전달 완료\n\n3)경북수산 / 최율호 대표\n가) 비타민E 25kg 주문 및 발송요청함\n (정우수산 입고 예정)\n\n4)부경양돈 / 김덕민 계장\n가) 메치오닌 적용가 관련 논의\n- 6월 메치오닌 7,200원 적용예정 (희우)\n나) 제면박 계약 관련 사항 문의\n- 타 원료계약 등으로 인해 차주 승인 예상\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["합천돼지자가","오케이","경북수산","부경양돈"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779750374824779","msg_ts":"1779750374.824779"},{"date":"2026-05-26","raw_text":"작성일자*\n2026-05-26\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 부산사료 / 김지은 과장\n가) 보호지방 시황 공유\n나)하이팻 4,000kg 주문 및 발송요청함\n   28일(목) 입고예정\n\n2)의령축협 / 김정원 과장\n가) 원료 시황 공유\n- 과자박 및 파인애플 사일리지 시황 공유 \n- 배합비 관련 문의\n  원료 단가 인상으로 인해 소폭 조정중 \n  추가 원료 필요시 견적 요청하기로함\n\n3)경북수산 / 최율호 대표\n- 조양수산 비타민E 25kg 주문 및 발송요청함\n   27일(수) 입고 예정\n\n4)영광축산 / 박현규 대표\n- 장프로 20kg 샘플 발송요청함\n   27일(수) 입고 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["부산사료","의령축협","경북수산","영광축산"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1779837391484759","msg_ts":"1779837391.484759"},{"date":"2026-05-27","raw_text":"작성일자*\n2026-05-27\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 천년TMF / 조광제 상무\n가)원료 시황 논의 \n- 메치오닌 시황 및 단가 공유\n- 비타민 관련 셀레늄 등으로 배합비 설계\n- 보호지방 구간마다 나누어 적용하는부분이 있음 \n- 아미노산 , 비타민 원료 정보 공유 요청\n\n2) 대덕농산 /최병기 대표\n가)원료 시황 논의\n- 보호지방 . 염화콜린 시황 전달 및 배합가능여부 확인\n- 기본 완제품 공급받아 특정 농가 필요시 원료 구매 및 판매진행\n- 단가 전달 및 농가판매 요청\n\n3) 함안 농장 / 송우열 대표\n가) 뉴트리신 제품 함안 지역 판매활성방안 논의\n-  정기 월례회의 일정 현재 없음\n-  추후 진행시 제품 설명회 진행 요청\n - 이지스타터 30kg 주문 및 발송요청함\n 28일(목) 입고 예정\n\n4)우일가축약품 / 강대규 과장\n- 나노비타믹스 100kg 주문 및 발송요청함\n 28일(목) 입고 예정\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["천년TMF","대덕농산","함안 농장","우일가축약품"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1780012675722709","msg_ts":"1780012675.722709"},{"date":"2026-05-28","raw_text":"작성일자*\n2026-05-28\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)한우협회 산청군 지부/ 실장\n가) 교육일정 공유 및 뉴트리신 제품 농가 소개 요청\n- 7월 산청군 교육 진행예정 100여명 참석예정\n나) 설사 제품 관련 문의\n- 부산기구 제품 현재 사용중 (플래보스업)\n\n2)산청조섬유 TMF/ 조춘래 소장\n가) 원료 시황 공유\n- 파인애플 사일리지 , 보호지방 시황 공유\n나) 비타민 시황 공유\n- VC35% 단가 공유\n다)미생물 배양 원료 소개 요청\n\n3)코리아에프앤에프 / 구본석 차장\n가)대두박 시황 공유\n- 6월 680원/ kg 단가 인상 전달\n- 함안축협 대두박 스펙 관련 사항 전달\n나) 대두박 25,000kg 주문 및 발송요청함\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["한우협회 산청군 지부","산청조섬유 TMF","코리아에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1780012732897569","msg_ts":"1780012732.897569"},{"date":"2026-05-29","raw_text":"작성일자*\n2026-05-29\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)뉴월드 아쿠아 /김정순 대표\n가) 비타민 시황 공유 \n- VC 97% , VE50% 단가 전달\n나)아미노산 제제 접목가능여부 논의\n-아미노산제 완제품에 포함 \n다)비타민 EC 제재 생산 여부 공유요청\n\n2)한우협회 거제시지부 / 배홍권 사무국장\n가) 뉴트리신 제품 함안 지역 판매활성방안 논의\n-  정기 월례회의 일정 현재 없음\n-  추후 진행시 제품 설명회 진행 요청\n나) 나노비타믹스 공급 관련 논의\n- 매일 급여 어려웠던 부분이 있어 재구매 시기 조율중\n\n3)코리아에프앤에프 / 구본석 차장\n가) 대두박 입고 사항 전달\n- 출고전표 거래명세서 전달\n나)6월 대두박 공급 가능분 전달 요청\n- 차주 관련사항 전달 하기로 함\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["뉴월드 아쿠아","한우협회 거제시지부","코리아에프앤에프"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1780268316503929","msg_ts":"1780268316.503929"},{"date":"2026-06-01","raw_text":"작성일자*\n2026-06-01\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1) 야베스 목장 / 전혜화 팀장\n가) 취급 원료 소개 및 적용 요청함\n- 보호지방 ,  파인애플 분말 ,블럭 등 소개\n나)간기능제 사용 관련 문의\n- 지원사업으로 간기능제 공급했으나 효과 미비 \n- 리버콜골드 소개 및 리플렛 전달\n- 대표보고후 연락예정\n\n2)노엘목장 / 신창호 대표\n가) 파인애플 분말 사용 관련 논의\n- 체세포 및 염증등에 효과 기대 \n- 일정부분 기여 하는것으로 판단\n나)파인애플 분말 100kg 주문 및 발송요청 \n-2일(화) 입고 예정\n\n3)코리아에프앤에프 /구본석 차장\n가) 대두박 6월 입고 관련 사항 전달\n\n4)오앤티 / 공제우 부장\n가) 원료 시황 공유 \n- 메치오닌 / 라이신 6월 시황 전달\n- 예상 발주량 추후 확인후 전달예정\n\n5)한승트레이딩 / 한창수 대표\n가) 뉴트리신 제품 농가 접목관련 사항 공유\n- 나노비타믹스 / 비타쎄 제품 농가 컨택중\n- 오케이 테스트 가능 농장 여부도 함께 컨택하기로 함\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["야베스 목장","노엘목장","코리아에프앤에프","오앤티","한승트레이딩"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1780357579988339","msg_ts":"1780357579.988339"},{"date":"2026-06-02","raw_text":"작성일자*\n2026-06-02\n*작성자*\n<@U08PUV8B431|박제영>\n*1. # (일반보고)*\n1.기본사항\n1)오케이 /류하나 부장\n가) 5월 마감 진행 여부 확인\n- 수량 공급가 마감 진행 담당자 전달\n\n2)부경양돈 / 김덕민 계장\n가) ECM 4,000kg 주문 및 발송 요청함\n나) 제면박 재계약 서류 작성 요청\n- 4일(목) 진행 예정\n\n3)유안사료 / 맹정무 차장\n가)ECM 샘플 전달 및 관련 사항 논의\n- 성분등록증 / 시험성적서 전달 요청\n- 지방률 더 높으면 좋겠다는 의견 (먼저 mesh 상태 검토요청)\n\n4)삼솔농장 / 한기웅 대표\n가) 나노비타블럭 관련 사항 공유\n- 단가 /포장단위 등 관련 사항 전달\n- 블럭 리플렛 전달\n*2. ## (타부서 or 임원진 공유 및 요청 내용)*\n.\n*3. ### (계약사항)*","clients":["오케이","부경양돈","유안사료","삼솔농장"],"permalink":"https://sein-biobs.slack.com/archives/C08S1SBMNNL/p1780530664795039","msg_ts":"1780530664.795039"
